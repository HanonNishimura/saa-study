<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0f1620">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="SAAハブ">
<link rel="apple-touch-icon" href="icon.svg">
<title>SAA 学習ハブ</title>
<style>
  :root{
    --bg:#f4f6f9; --card:#fff; --text:#1f2937; --sub:#6b7280; --line:#e5e7eb;
    --accent:#2563eb; --btn:#f3f4f6; --shadow:0 1px 3px rgba(0,0,0,.08);
  }
  body.dark{
    --bg:#0f1620; --card:#1a2230; --text:#e8edf3; --sub:#9aa6b5; --line:#26303f;
    --accent:#f47b27; --btn:#1f2937; --shadow:none;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Kaku Gothic ProN",Meiryo,sans-serif;
    line-height:1.5;padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom)}
  .wrap{max-width:560px;margin:0 auto;padding:16px}
  header{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px}
  h1{font-size:21px;margin:0;font-weight:800}
  .toggle{border:0;background:var(--btn);color:var(--text);padding:7px 12px;border-radius:999px;font-weight:700;font-size:13px;cursor:pointer}
  .lead{color:var(--sub);font-size:13px;margin:6px 0 16px}
  .days{display:inline-block;background:var(--accent);color:#fff;font-weight:800;border-radius:8px;padding:1px 9px;font-size:13px}
  body.dark .days{color:#1a1208}
  a.tile{display:flex;align-items:center;gap:14px;text-decoration:none;color:var(--text);
    background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:11px;box-shadow:var(--shadow);transition:.12s}
  a.tile:active{transform:scale(.99)}
  .ic{font-size:30px;width:44px;text-align:center;flex:0 0 auto}
  .tx{flex:1;min-width:0}
  .tt{display:block;font-size:17px;font-weight:800}
  .ds{display:block;font-size:12.5px;color:var(--sub);margin-top:2px}
  .ar{color:var(--sub);font-size:20px;flex:0 0 auto}
  .ext{font-size:10px;color:var(--sub);border:1px solid var(--line);border-radius:5px;padding:1px 5px;margin-left:6px;vertical-align:middle}
  .group{font-size:12px;font-weight:700;color:var(--sub);margin:14px 4px 8px}
  footer{color:var(--sub);font-size:12px;margin:16px 4px 4px;line-height:1.6}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>📚 SAA 学習ハブ</h1>
    <button class="toggle" id="tg" onclick="toggleTheme()">🌙</button>
  </header>
  <p class="lead">AWS SAA-C03 の勉強ツール入口。試験 6/24 まであと <span class="days" id="days">—</span> 日。</p>

  <div class="group">― メイン ―</div>
  <a class="tile" href="index.html">
    <span class="ic">📖</span><span class="tx"><span class="tt">本体アプリ</span><span class="ds">予定・教材・単語帳・統計・デッキ</span></span><span class="ar">›</span>
  </a>
  <a class="tile" href="quiz.html">
    <span class="ic">⚡</span><span class="tx"><span class="tt">スキマクイズ</span><span class="ds">通勤/ベッド・弱点特化・苦手だけ復習</span></span><span class="ar">›</span>
  </a>
  <a class="tile" href="https://hanonnishimura.github.io/saa-moshi-trainer/">
    <span class="ic">📝</span><span class="tx"><span class="tt">模試トレーナー<span class="ext">別アプリ</span></span><span class="ds">本番レベルの模試演習・弱点分析</span></span><span class="ar">›</span>
  </a>

  <div class="group">― 補助 ―</div>
  <a class="tile" href="https://hanonnishimura.github.io/saa-anki_study/">
    <span class="ic">🗂</span><span class="tx"><span class="tt">暗記チェック<span class="ext">別アプリ</span></span><span class="ds">用語の暗記を反復チェック</span></span><span class="ar">›</span>
  </a>
  <a class="tile" href="cheat.html">
    <span class="ic">📄</span><span class="tx"><span class="tt">直前チートシート</span><span class="ds">言葉→サービス変換表・絞り込み検索</span></span><span class="ar">›</span>
  </a>

  <footer>
    💡 このページを<b>ホーム画面に追加</b>すれば、アイコン1つでここから全部に飛べます。<br>
    （各ツールは独立して動きます。「別アプリ」は別ページに移動します）
  </footer>
</div>
<script>
  function toggleTheme(){const d=document.body.classList.toggle('dark');document.getElementById('tg').textContent=d?'☀️':'🌙';localStorage.setItem('hubTheme',d?'dark':'light');}
  if(localStorage.getItem('hubTheme')==='dark'){document.body.classList.add('dark');document.getElementById('tg').textContent='☀️';}
  (function(){const exam=new Date(2026,5,24);const now=new Date();const d=Math.ceil((exam-new Date(now.getFullYear(),now.getMonth(),now.getDate()))/86400000);document.getElementById('days').textContent=d>=0?d:0;})();
</script>
</body>
</html>
