<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#f47b27">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SAA勉強">
<title>AWS SAA-C03 合格への道</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="apple-touch-icon" href="icon.svg">
<style>
:root {
  --bg: #0f1620;
  --surface: #1a2332;
  --surface2: #243044;
  --border: #2e3a52;
  --text: #e8edf5;
  --muted: #8b96a8;
  --accent: #f47b27;
  --accent-soft: #f47b2722;
  --ok: #4caf50;
  --warn: #ffb74d;
  --bad: #ef5350;
  --night1: #3a4a6b;
  --night2pre: #5b3a6b;
  --nightafter: #6b4a2a;
  --offday: #2a3f5f;
  --exam: #b33a1a;
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body {
  margin: 0; padding: 0;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Yu Gothic", system-ui, sans-serif;
  font-size: 15px;
  line-height: 1.5;
  -webkit-text-size-adjust: 100%;
  overscroll-behavior-y: contain;
}
body { padding-bottom: 80px; }

/* ===== Header ===== */
header {
  position: sticky; top: 0; z-index: 100;
  background: linear-gradient(135deg, #1a2332 0%, #243044 100%);
  border-bottom: 2px solid var(--accent);
  padding: 12px 14px 10px;
  padding-top: calc(12px + env(safe-area-inset-top));
}
.title { font-size: 16px; font-weight: 700; color: var(--accent); letter-spacing: 0.02em; }
.subtitle { font-size: 12px; color: var(--muted); margin-top: 2px; }
.stats-row {
  display: grid; grid-template-columns: 1fr 1fr 1fr;
  gap: 8px; margin-top: 10px;
}
.stat {
  background: rgba(0,0,0,0.25);
  border-radius: 8px; padding: 6px 8px;
  text-align: center;
}
.stat-label { font-size: 10px; color: var(--muted); }
.stat-value { font-size: 17px; font-weight: 700; color: var(--accent); margin-top: 1px; }
.stat-sub { font-size: 10px; color: var(--muted); }

.progress-bar {
  margin-top: 10px;
  height: 8px; background: rgba(0,0,0,0.35); border-radius: 6px; overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), #ffa566);
  transition: width 0.4s ease;
}
.progress-text {
  font-size: 11px; color: var(--muted); margin-top: 4px; text-align: right;
}

/* ===== Tabs ===== */
.tabs {
  display: flex; gap: 0; margin-top: 10px;
  background: rgba(0,0,0,0.3); border-radius: 8px; padding: 3px;
}
.tab {
  flex: 1; padding: 8px 2px; text-align: center;
  font-size: 11px; font-weight: 600; color: var(--muted);
  background: transparent; border: none; border-radius: 6px;
  cursor: pointer; transition: all 0.2s;
  white-space: nowrap;
}
.tab.active { background: var(--accent); color: #fff; }

/* ===== Today button ===== */
.today-btn {
  position: fixed; right: 14px; bottom: 14px; z-index: 50;
  background: var(--accent); color: #fff;
  border: none; border-radius: 50%;
  width: 52px; height: 52px;
  font-size: 11px; font-weight: 700;
  box-shadow: 0 4px 12px rgba(244, 123, 39, 0.4);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.today-btn:active { transform: scale(0.95); }

/* ===== View container ===== */
main { padding: 12px 12px 20px; }
.view { display: none; }
.view.active { display: block; }

/* ===== Day card ===== */
.day-card {
  background: var(--surface);
  border-radius: 12px;
  margin-bottom: 12px;
  overflow: hidden;
  border-left: 4px solid var(--border);
  transition: border-color 0.2s;
}
.day-card.today { border-left-color: var(--accent); box-shadow: 0 0 0 1px var(--accent-soft); }
.day-card.done { opacity: 0.6; }
.day-card.shift-night1 { border-left-color: var(--night1); }
.day-card.shift-night2pre { border-left-color: var(--night2pre); background: linear-gradient(135deg, var(--surface) 0%, #2a1f3a 100%); }
.day-card.shift-nightafter { border-left-color: var(--nightafter); }
.day-card.shift-off { border-left-color: var(--offday); }
.day-card.shift-exam { border-left-color: var(--exam); background: linear-gradient(135deg, #3a1a14 0%, var(--surface) 100%); }

.day-head {
  padding: 10px 12px;
  display: flex; align-items: center; justify-content: space-between;
  cursor: pointer; user-select: none;
}
.day-head-l { display: flex; align-items: center; gap: 10px; }
.day-date {
  font-size: 18px; font-weight: 700;
  min-width: 56px;
}
.day-dow {
  font-size: 11px; color: var(--muted);
  background: rgba(0,0,0,0.3); padding: 2px 6px; border-radius: 4px;
}
.day-dow.sun { color: #ff8a80; }
.day-dow.sat { color: #82b1ff; }
.day-shift {
  font-size: 11px; font-weight: 600;
  padding: 3px 8px; border-radius: 4px;
  background: var(--surface2);
}
.day-shift.night1 { background: var(--night1); color: #fff; }
.day-shift.night2pre { background: var(--night2pre); color: #fff; }
.day-shift.nightafter { background: var(--nightafter); color: #fff; }
.day-shift.off { background: var(--offday); color: #fff; }
.day-shift.exam { background: var(--exam); color: #fff; }

.day-time {
  font-size: 13px; font-weight: 700; color: var(--accent);
}
.day-time .target { color: var(--muted); font-weight: 500; }
.toggle-arrow {
  color: var(--muted); font-size: 12px; transition: transform 0.2s;
  margin-left: 6px;
}
.day-card.open .toggle-arrow { transform: rotate(90deg); }

.day-body {
  display: none;
  padding: 0 12px 12px;
  border-top: 1px solid var(--border);
}
.day-card.open .day-body { display: block; }

.day-section {
  margin-top: 10px;
}
.section-title {
  font-size: 11px; color: var(--muted); font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.05em;
  margin-bottom: 6px;
}

/* ===== Task / checkbox ===== */
.task {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 9px 8px; margin-bottom: 4px;
  background: rgba(0,0,0,0.2);
  border-radius: 8px;
  cursor: pointer; user-select: none;
  min-height: 44px;
}
.task input[type="checkbox"] {
  width: 22px; height: 22px;
  margin: 0; flex-shrink: 0;
  accent-color: var(--accent);
  cursor: pointer;
}
.task-label {
  flex: 1; font-size: 13.5px; line-height: 1.45;
}
.task.done .task-label {
  text-decoration: line-through;
  color: var(--muted);
}
.carryover-section {
  background: rgba(239, 83, 80, 0.08);
  border: 1px solid rgba(239, 83, 80, 0.35);
  border-radius: 8px;
  padding: 8px;
  margin-top: 10px;
}
.carryover-section .section-title { color: var(--bad); }
.task.carryover { background: rgba(239, 83, 80, 0.12); }
.carry-from {
  display: inline-block;
  font-size: 10px; font-weight: 700;
  color: #fff; background: var(--bad);
  border-radius: 4px; padding: 1px 5px; margin-right: 6px;
  vertical-align: middle;
}

/* ===== Time input ===== */
.time-row {
  display: flex; align-items: center; gap: 8px;
  margin-top: 8px;
}
.time-row label { font-size: 12px; color: var(--muted); flex-shrink: 0; }
.time-input {
  width: 64px;
  background: rgba(0,0,0,0.3);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 6px 8px;
  font-size: 14px;
  text-align: center;
  font-family: inherit;
}
.time-input:focus { outline: none; border-color: var(--accent); }
.time-target { font-size: 12px; color: var(--muted); }

/* ===== Note ===== */
.note-input {
  width: 100%;
  background: rgba(0,0,0,0.25);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px;
  font-size: 13px;
  font-family: inherit;
  resize: vertical;
  min-height: 50px;
}
.note-input:focus { outline: none; border-color: var(--accent); }

.memo-hint { font-size: 11px; color: var(--muted); margin-top: 6px; font-style: italic; }

/* ===== Stats view ===== */
.stat-card {
  background: var(--surface);
  border-radius: 12px;
  padding: 14px;
  margin-bottom: 12px;
}
.stat-card h3 {
  margin: 0 0 10px;
  font-size: 14px; color: var(--accent);
}
.big-num {
  font-size: 32px; font-weight: 700; color: var(--accent);
}
.big-num .unit { font-size: 14px; color: var(--muted); font-weight: 400; }
.kv-row {
  display: flex; justify-content: space-between;
  padding: 6px 0;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.kv-row:last-child { border-bottom: none; }
.kv-row .v { color: var(--accent); font-weight: 600; }

/* ===== Exam view ===== */
.exam-row {
  display: grid;
  grid-template-columns: 1fr auto auto;
  gap: 10px; align-items: center;
  padding: 10px;
  background: rgba(0,0,0,0.2);
  border-radius: 8px;
  margin-bottom: 8px;
}
.exam-name { font-size: 13px; }
.exam-target { font-size: 11px; color: var(--muted); display: block; }
.exam-score-input {
  width: 70px;
  background: rgba(0,0,0,0.4);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 6px;
  font-size: 14px; text-align: center;
  font-family: inherit;
}
.score-badge {
  font-size: 11px; padding: 3px 7px; border-radius: 4px;
  min-width: 38px; text-align: center;
}
.score-badge.pass { background: var(--ok); color: #fff; }
.score-badge.near { background: var(--warn); color: #000; }
.score-badge.fail { background: var(--bad); color: #fff; }
.score-badge.empty { background: var(--border); color: var(--muted); }

/* ===== Settings ===== */
.settings-section { margin-top: 16px; }
.btn {
  display: inline-block;
  padding: 10px 16px;
  background: var(--surface2);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 13px; font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  margin-right: 6px; margin-bottom: 6px;
}
.btn:active { background: var(--border); }
.btn.danger { color: var(--bad); border-color: var(--bad); }
.btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }

.priority-table {
  width: 100%; font-size: 12px;
  border-collapse: collapse;
}
.priority-table th, .priority-table td {
  padding: 6px 4px;
  border-bottom: 1px solid var(--border);
  text-align: left;
}
.priority-table th { color: var(--muted); font-weight: 600; }
.prio-top { color: var(--bad); font-weight: 700; }
.prio-mid { color: var(--warn); }
.prio-low { color: var(--muted); }
.prio-done { color: var(--ok); }

/* ===== Decks view ===== */
.deck-cat {
  font-size: 11px; color: var(--accent); font-weight: 700;
  margin: 12px 0 6px; padding-top: 8px;
  border-top: 1px solid var(--border);
}
.deck-cat:first-of-type { border-top: none; padding-top: 0; margin-top: 4px; }

/* デッキ割り当て（日付カード内） */
.deck-assign-row {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 8px; margin-bottom: 4px;
  background: rgba(0,0,0,0.2); border-radius: 8px;
  min-height: 38px;
}
.deck-assign-row input[type="checkbox"] {
  width: 20px; height: 20px; margin: 0; flex-shrink: 0;
  accent-color: var(--accent); cursor: pointer;
}
.deck-assign-name { flex: 1; font-size: 13px; line-height: 1.4; color: var(--text); }
.deck-sec-badge {
  display: inline-block; font-size: 10px; font-weight: 700;
  color: var(--accent); background: var(--accent-soft);
  border: 1px solid var(--accent); border-radius: 4px;
  padding: 0 5px; margin-right: 6px; vertical-align: middle;
}
.deck-assign-row.done .deck-assign-name { text-decoration: line-through; color: var(--muted); }
.deck-remove {
  flex-shrink: 0; width: 26px; height: 26px;
  background: transparent; border: 1px solid var(--border); border-radius: 6px;
  color: var(--muted); font-size: 16px; line-height: 1; cursor: pointer;
  font-family: inherit;
}
.deck-remove:active { background: var(--border); }
.deck-add-select {
  width: 100%; margin-top: 4px;
  background: rgba(0,0,0,0.3); color: var(--text);
  border: 1px solid var(--border); border-radius: 6px;
  padding: 8px; font-size: 13px; font-family: inherit;
}
.deck-add-select:focus { outline: none; border-color: var(--accent); }
.deck-prio-group { margin-bottom: 12px; }
.deck-prio-label {
  font-size: 11px; font-weight: 700; margin-bottom: 5px;
  padding: 2px 8px; border-radius: 4px; display: inline-block;
}
.deck-prio-high { background: rgba(239,83,80,0.18); color: #ff8a80; }
.deck-prio-mid  { background: rgba(255,183,77,0.18); color: #ffb74d; }
.deck-prio-low  { background: rgba(139,150,168,0.18); color: var(--muted); }

/* デッキ実施回数（5段階ピップ） */
.deck-pip-row {
  display: flex; align-items: center; gap: 10px;
  padding: 8px; margin-bottom: 4px;
  background: rgba(0,0,0,0.2); border-radius: 8px;
}
.deck-pip-row .deck-name { flex: 1; font-size: 13px; color: var(--text); line-height: 1.3; }
.deck-pips { display: flex; gap: 4px; flex-shrink: 0; }
.pip {
  width: 14px; height: 14px; border-radius: 50%;
  border: 1.5px solid var(--border); background: transparent;
}
.pip.on { background: var(--accent); border-color: var(--accent); }
.deck-rep-count {
  flex-shrink: 0; font-size: 11px; color: var(--muted);
  min-width: 28px; text-align: right;
}
.deck-pip-row.started .deck-rep-count { color: var(--accent); font-weight: 700; }

/* ===== Study material view ===== */
.study-chap { font-size: 12px; font-weight: 700; color: var(--accent); margin: 14px 2px 6px; }
.study-sec { background: var(--surface); border-radius: 10px; margin-bottom: 8px; overflow: hidden; }
.study-sec-head {
  display: flex; align-items: center; justify-content: space-between; gap: 8px;
  padding: 11px 12px; cursor: pointer; user-select: none; min-height: 44px;
}
.study-sec-title { font-size: 13.5px; line-height: 1.35; }
.study-sec-meta { font-size: 11px; color: var(--muted); flex-shrink: 0; }
.study-sec .toggle-arrow { display: inline-block; transition: transform 0.2s; }
.study-sec.open .toggle-arrow { transform: rotate(90deg); }
.study-sec-body { display: none; padding: 0 12px 12px; border-top: 1px solid var(--border); }
.study-sec.open .study-sec-body { display: block; }
.study-sub-title {
  font-size: 11px; font-weight: 700; color: var(--accent);
  letter-spacing: 0.04em; margin: 12px 0 6px;
}
.study-kw {
  white-space: pre-wrap; font-size: 12px; line-height: 1.6; color: var(--text);
  background: rgba(0,0,0,0.2); border-radius: 8px; padding: 10px; margin: 0; font-family: inherit;
}
.term-row { padding: 7px 8px; margin-bottom: 4px; background: rgba(0,0,0,0.18); border-radius: 8px; }
.term-t { font-size: 12.5px; font-weight: 700; color: var(--text); }
.term-m { font-size: 12px; color: var(--muted); line-height: 1.5; margin-top: 2px; }
.point-row { padding: 7px 8px; margin-bottom: 4px; background: rgba(0,0,0,0.18); border-radius: 8px; font-size: 12px; line-height: 1.55; }
.point-i { display: block; font-weight: 700; color: var(--accent); font-size: 11.5px; margin-bottom: 2px; }
.point-x { color: var(--text); }
.quiz-q { padding: 10px; margin-bottom: 8px; background: rgba(0,0,0,0.22); border-radius: 8px; }
.quiz-qtext { font-size: 13px; line-height: 1.5; margin-bottom: 8px; }
.quiz-choices { display: flex; flex-direction: column; gap: 6px; }
.quiz-choice {
  text-align: left; font-family: inherit; font-size: 12.5px; line-height: 1.4;
  padding: 9px 10px; border-radius: 8px; border: 1px solid var(--border);
  background: var(--surface2); color: var(--text); cursor: pointer;
}
.quiz-choice:active { background: var(--border); }
.quiz-choice.correct { border-color: var(--ok); background: rgba(76,175,80,0.18); color: #a5d6a7; }
.quiz-choice.wrong { border-color: var(--bad); background: rgba(239,83,80,0.18); color: #ef9a9a; }
.quiz-exp { margin-top: 8px; font-size: 12px; line-height: 1.55; color: var(--muted); background: rgba(0,0,0,0.25); border-radius: 8px; padding: 8px; }
.quiz-exp.hidden { display: none; }
.quiz-badge { font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 4px; margin-left: 6px; }
.quiz-badge.ok { background: var(--ok); color: #fff; }
.quiz-badge.ng { background: var(--bad); color: #fff; }

/* ===== Flashcard (単語帳) ===== */
.flash-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 0 4px; gap: 8px;
}
.flash-progress { font-size: 13px; font-weight: 700; color: var(--accent); }
.sec-toggle-wrap { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 4px; }
.sec-toggle-btn {
  padding: 6px 10px; border-radius: 20px; font-size: 12px; font-weight: 600;
  background: var(--surface2); color: var(--muted);
  border: 1px solid var(--border); cursor: pointer;
}
.sec-toggle-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.flash-vocab-card {
  background: var(--surface); border-radius: 16px;
  min-height: 200px; padding: 24px 16px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  margin: 4px 0; cursor: pointer; text-align: center;
  border: 2px solid var(--border);
}
.flash-face.hidden { display: none; }
.flash-cat { font-size: 11px; color: var(--muted); margin-bottom: 12px; }
.flash-term { font-size: 22px; font-weight: 700; color: var(--accent); line-height: 1.35; }
.flash-def { font-size: 14px; color: var(--text); line-height: 1.65; }
.flash-tap-hint { font-size: 11px; color: var(--muted); margin-top: 16px; }
.flash-answer-row {
  display: flex; gap: 10px; margin-top: 10px;
}
.flash-answer-row.hidden { display: none; }
.flash-ok { flex: 1; background: var(--ok); color: #fff; border-color: var(--ok); padding: 14px; font-size: 15px; font-weight: 700; }
.flash-ng { flex: 1; background: var(--bad); color: #fff; border-color: var(--bad); padding: 14px; font-size: 15px; font-weight: 700; }
.flash-check { flex: 1; background: var(--accent); color: #fff; border-color: var(--accent); padding: 14px; font-size: 15px; font-weight: 700; }
.flash-diagram-body { font-size: 13px; }
.flash-diagram-body .dc-table table { width: 100%; border-collapse: collapse; font-size: 12px; }
.flash-diagram-body .dc-table th { background: var(--surface2); color: var(--muted); padding: 6px 8px; text-align: left; font-size: 11px; }
.flash-diagram-body .dc-table td { padding: 6px 8px; border-bottom: 1px solid var(--border); vertical-align: top; line-height: 1.4; }
.flash-diagram-body .dc-svg-wrap { text-align: center; }
.flash-diagram-body .dc-svg { width: 100%; max-width: 380px; }
.flash-diagram-body .dc-blank-legend { font-size: 12px; color: var(--muted); margin-top: 8px; display: flex; flex-wrap: wrap; gap: 8px; }
.flash-diagram-body .dc-blank-legend b { color: var(--accent); cursor: default; }
.flash-diagram-body .dc-note { font-size: 11px; color: var(--muted); margin-top: 8px; font-style: italic; }
.blank {
  display: inline-block; background: var(--surface2); border: 1px dashed var(--accent);
  color: var(--accent); border-radius: 4px; padding: 1px 8px; cursor: default;
  font-weight: 600; font-size: 12px;
}
.flash-blank-inputs { margin-top: 12px; }
.flash-blank-row {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 8px;
}
.flash-blank-num {
  flex-shrink: 0; width: 22px; height: 22px; border-radius: 50%;
  background: var(--accent); color: #fff; font-size: 11px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
}
.flash-blank-input {
  flex: 1; background: rgba(0,0,0,0.3); color: var(--text);
  border: 1px solid var(--border); border-radius: 6px;
  padding: 8px; font-size: 13px; font-family: inherit;
}
.flash-blank-input:focus { outline: none; border-color: var(--accent); }
.flash-blank-hint { font-size: 11px; flex-shrink: 0; max-width: 100px; }
.pulse { animation: pulse 0.5s ease 2; }
@keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }
/* 節ボタン内の枚数バッジ */
.sec-count {
  font-size: 9px; font-weight: 600;
  color: var(--muted); margin-left: 3px;

.flash-action-row .btn { flex: 1; padding: 13px; font-size: 14px; text-align: center; }
/* 閲覧モード */
.browse-sec-head {
  font-size: 12px; font-weight: 700; color: var(--accent);
  margin: 14px 2px 6px; display: flex; align-items: center; gap: 6px;

.browse-card {

.diag-desc  { font-size: 12px; color: var(--muted); margin-bottom: 10px; }

.diag-blank {

  font-weight: 700; font-size: 13px; cursor: default;

  display: inline-block;
  background: rgba(255,183,77,0.12);

  display: flex; justify-content: space-between; gap: 8px; margin-top: 8px;

.diag-nav-row .btn { flex: 1; padding: 12px; }

.diag-blank-hidden {
  display: inline-block;
  background: rgba(255,183,77,0.12);
  border: 2px dashed var(--warn);
  color: var(--warn);
  border-radius: 6px; padding: 2px 14px;
  font-weight: 700; font-size: 13px;
  min-width: 60px; text-align: center;

.diag-blank-hidden sub { font-size: 9px; vertical-align: sub; color: var(--muted); }
/* 虫食い: 表示されている空欄（緑） */
.diag-blank-shown {
  display: inline-block;
  background: rgba(76,175,80,0.12);
  border: 1px solid var(--ok);
  color: var(--ok);
  border-radius: 6px; padding: 2px 10px;
  font-weight: 600; font-size: 12px;
}
.diag-legend-blank {
  display: inline-block;

.diag-legend-shown {

.mask-hidden { color: var(--warn); }
.mask-shown  { color: var(--ok); }

.update-banner {
  position: fixed; left: 12px; right: 12px;
  bottom: calc(14px + env(safe-area-inset-bottom));
  z-index: 300;
  background: var(--accent); color: #fff;
  border-radius: 12px; padding: 12px 14px;
  display: none; align-items: center; justify-content: space-between;
  box-shadow: 0 6px 20px rgba(0,0,0,0.45);
  font-size: 13px; font-weight: 600;
}
.update-banner.show { display: flex; }
.update-banner button {
  background: #fff; color: var(--accent);
  border: none; border-radius: 8px;
  padding: 8px 18px; font-size: 13px; font-weight: 700;
  font-family: inherit; cursor: pointer; flex-shrink: 0; margin-left: 12px;
}
.update-banner button:active { opacity: 0.8; }

/* ===== Backup status ===== */
.backup-status { font-size: 12px; color: var(--muted); margin: 2px 2px 10px; }
.backup-status.warn { color: var(--warn); font-weight: 600; }

/* ===== Toast ===== */
.toast {
  position: fixed; bottom: 86px; left: 50%; transform: translateX(-50%);
  background: var(--accent); color: #fff;
  padding: 8px 16px; border-radius: 20px;
  font-size: 13px; font-weight: 600;
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s, transform 0.3s;
  z-index: 200;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(-6px); }

.empty-msg { text-align: center; color: var(--muted); padding: 40px 20px; font-size: 13px; }
.hint { font-size: 11px; color: var(--muted); margin: 6px 2px 10px; }

DECK_GROUPS.forEach(g => g.decks.forEach(d => { DECK_BY_ID[d.id] = d; }));

// {sec: 節番号, id: デッキID}。sec は日付カードでバッジ表示して対応章を示す。

// date -> { deckId: 節番号 }（バッジ表示用の逆引き）
const DECK_SEC_BY_DATE = {};
for (const dt in DEFAULT_DAY_DECKS) {
  DECK_SEC_BY_DATE[dt] = {};
  DEFAULT_DAY_DECKS[dt].forEach(x => { DECK_SEC_BY_DATE[dt][x.id] = x.sec; });
}
// 初回のみ：◎デッキを各日付の「優先度 高」に投入（既存の割り当ては保持してマージ）
function seedDefaultDecks() {
  if (state.decksSeeded) return;
  for (const dt in DEFAULT_DAY_DECKS) {
    const b = getDayDeckBuckets(dt) || { high:[], mid:[], low:[] };
    const all = [].concat(b.high||[], b.mid||[], b.low||[]);
    DEFAULT_DAY_DECKS[dt].forEach(x => {
      if (!all.includes(x.id)) { b.high.push(x.id); all.push(x.id); }
    });
    state.dayDecks[dt] = b;
  }
  state.decksSeeded = true;
  saveState();
}

// 「デッキを追加」セレクトのオプション（指定日に割当済みは無効化）
function deckOptionsHtml(excludeIds) {
  excludeIds = excludeIds || [];
  let html = '<option value="">＋ デッキを追加…</option>';
  DECK_GROUPS.forEach(g => {
    html += `<optgroup label="${escapeHtml(g.cat)}">`;
    g.decks.forEach(d => {
      const dis = excludeIds.includes(d.id) ? ' disabled' : '';
      html += `<option value="${d.id}"${dis}>${escapeHtml(d.name)}</option>`;
    });
    html += '</optgroup>';
  });
  return html;
}

// 優先度（高・中・低）
const DECK_PRIOS = [
  { key:"high", label:"優先度 高" },
  { key:"mid",  label:"優先度 中" },
  { key:"low",  label:"優先度 低" }
];

// その日の割り当てを {high:[], mid:[], low:[]} に正規化（旧形式=配列は「中」へ移行）
function getDayDeckBuckets(date) {
  let b = state.dayDecks[date];
  if (!b) return { high:[], mid:[], low:[] };
  if (Array.isArray(b)) { b = { high:[], mid:b.slice(), low:[] }; state.dayDecks[date] = b; }
  return { high: b.high || [], mid: b.mid || [], low: b.low || [] };
}

// 日付カード内「デッキ」欄のHTML（優先度3グループ + 各グループに追加欄）
function dayDeckSectionHtml(date) {
  const buckets = getDayDeckBuckets(date);
  const assignedAll = [].concat(buckets.high, buckets.mid, buckets.low);
  let html = "";
  DECK_PRIOS.forEach(p => {
    html += `<div class="deck-prio-group">
      <div class="deck-prio-label deck-prio-${p.key}">${p.label}</div>`;
    (buckets[p.key] || []).forEach(id => {
      const deck = DECK_BY_ID[id];
      if (!deck) return;
      const done = !!(state.deckDoneByDate[date] && state.deckDoneByDate[date][id]);
      const secLbl = (DECK_SEC_BY_DATE[date] && DECK_SEC_BY_DATE[date][id]) || "";
      html += `<div class="deck-assign-row${done?" done":""}" data-dassign="${date}|${id}">
        <input type="checkbox" ${done?"checked":""}>
        <span class="deck-assign-name">${secLbl?`<span class="deck-sec-badge">${secLbl}</span>`:""}${escapeHtml(deck.name)}</span>
        <button class="deck-remove" data-dremove="${date}|${p.key}|${id}" title="このデッキを外す">×</button>
      </div>`;
    });
    html += `<select class="deck-add-select" data-deckadd="${date}|${p.key}">
        ${deckOptionsHtml(assignedAll)}
      </select>
    </div>`;
  });
  return html;
}

// 該当日のデッキ欄だけを部分更新（カードは開いたまま）
function refreshDayDecks(date) {
  const wrap = document.querySelector('[data-deckwrap="' + date + '"]');
  if (!wrap) return;
  wrap.innerHTML = dayDeckSectionHtml(date);
  bindDeckControls(wrap);
}

// デッキ欄のイベント（root配下のみバインド）
function bindDeckControls(root) {
  root = root || document;
  root.querySelectorAll("[data-deckadd]").forEach(el => {
    el.addEventListener("change", () => {
      const parts = el.getAttribute("data-deckadd").split("|");
      const date = parts[0], prio = parts[1];
      const id = el.value;
      if (!id) return;
      const buckets = getDayDeckBuckets(date);
      const all = [].concat(buckets.high, buckets.mid, buckets.low);
      if (!all.includes(id)) buckets[prio].push(id);
      state.dayDecks[date] = buckets;
      saveState();
      refreshDayDecks(date);
    });
  });
  root.querySelectorAll("[data-dremove]").forEach(el => {
    el.addEventListener("click", e => {
      e.preventDefault(); e.stopPropagation();
      const parts = el.getAttribute("data-dremove").split("|");
      const date = parts[0], prio = parts[1], id = parts[2];
      const buckets = getDayDeckBuckets(date);
      buckets[prio] = (buckets[prio] || []).filter(x => x !== id);
      if (!buckets.high.length && !buckets.mid.length && !buckets.low.length) delete state.dayDecks[date];
      else state.dayDecks[date] = buckets;
      saveState();
      refreshDayDecks(date);
    });
  });
  root.querySelectorAll("[data-dassign]").forEach(el => {
    el.addEventListener("click", e => {
      if (e.target.closest(".deck-remove")) return;
      e.preventDefault();
      const parts = el.getAttribute("data-dassign").split("|");
      const date = parts[0], id = parts[1];
      if (!state.deckDoneByDate[date]) state.deckDoneByDate[date] = {};
      const now = !state.deckDoneByDate[date][id];
      if (now) state.deckDoneByDate[date][id] = true;
      else delete state.deckDoneByDate[date][id];
      const cb = el.querySelector('input[type="checkbox"]');
      cb.checked = now;
      el.classList.toggle("done", now);
      saveState();
    });
  });
}

const EXAM_DATE = new Date(2026, 5, 10); // 6/10
const STORAGE_KEY = "saa_study_v1";

// ===== State =====
let state = {
  checks: {},       // taskId -> bool
  actualHours: {},  // date -> number
  gapQuestions: {}, // date -> number (隙間時間で解いた問題数)
  notes: {},        // date -> string
  examScores: {},   // examId -> number
  openDates: {},    // date -> bool
  deckDone: {},        // (旧) deckId -> bool ※後方互換のため保持・未使用
  deckDoneByDate: {},  // date -> { deckId: true } 日付ごとの実施チェック（独立）
  dayDecks: {},     // date -> [deckId, ...] (その日に割り当てたデッキ)
  lastBackup: 0,    // 最終エクスポート時刻(epoch ms)
  decksSeeded: false, // ◎デッキの初期投入済みフラグ
  quiz: {},         // "sec#n" -> { r:"o"|"x", c:選択肢index } 確認テストの解答
  studyOpen: {},    // sec -> bool 教材タブの節の開閉
  flashSessions: [], // 単語帳セッション履歴
  flashGoals: {}    // "vocab"|"diagram"|"all" -> 目標正答率(%)

};

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) state = Object.assign(state, JSON.parse(raw));
  } catch(e) { console.warn(e); }
}
function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
  catch(e) { showToast("保存失敗"); }
}

// ===== Helpers =====
function getToday() {
  const now = new Date();
  return (now.getMonth()+1) + "/" + now.getDate();
}
function isToday(dateStr) { return dateStr === getToday(); }

function daysLeft() {
  const now = new Date();
  const ms = EXAM_DATE.getTime() - now.getTime();
  return Math.max(0, Math.ceil(ms / 86400000));
}

function totalActualHours() {
  return Object.values(state.actualHours).reduce((a,b) => a + (parseFloat(b)||0), 0);
}
function totalTargetHours() {
  return SCHEDULE.reduce((a,d) => a + d.targetHours, 0);
}
function totalGapQuestions() {
  return Object.values(state.gapQuestions).reduce((a,b) => a + (parseInt(b,10)||0), 0);
}
function daysWithGapQ() {
  return Object.values(state.gapQuestions).filter(v => (parseInt(v,10)||0) > 0).length;
}
function countTasks() {
  let total = 0, done = 0;
  SCHEDULE.forEach(d => {
    d.tasks.forEach(t => {
      total++;
      if (state.checks[t.id]) done++;
    });
  });
  return { total, done };
}

// ===== Header update =====
function renderHeader() {
  document.getElementById("days-left").textContent = daysLeft();
  document.getElementById("total-hours").textContent = totalActualHours().toFixed(1);
  const tc = countTasks();
  document.getElementById("task-done").textContent = tc.done;
  document.getElementById("task-total").textContent = "/ " + tc.total;
  const pct = tc.total ? Math.round(tc.done / tc.total * 100) : 0;
  document.getElementById("progress-fill").style.width = pct + "%";
  document.getElementById("progress-text").textContent = "タスク進捗 " + pct + "%  ／  時間 " + Math.round(totalActualHours()/totalTargetHours()*100) + "%";
}

// ===== Carryover (前日までの未完了を当日に引き継ぐ) =====
function getTodayIndex() {
  return SCHEDULE.findIndex(d => isToday(d.date));
}
function getCarryoverTasks() {
  const ti = getTodayIndex();
  if (ti <= 0) return [];
  const list = [];
  for (let i = 0; i < ti; i++) {
    const d = SCHEDULE[i];
    if (d.targetHours <= 0) continue; // 勉強NG・休養日は対象外
    d.tasks.forEach(t => {
      if (!state.checks[t.id]) list.push({ id:t.id, label:t.label, from:d.date });
    });
  }
  return list;
}

// ===== Schedule view =====
function renderSchedule() {
  const v = document.getElementById("view-schedule");
  const today = getToday();
  let html = "";
  SCHEDULE.forEach(d => {
    const todayCls = isToday(d.date) ? " today" : "";
    const shiftCls = d.shiftClass ? " shift-" + d.shiftClass : "";
    const open = !!state.openDates[d.date] || isToday(d.date);
    const openCls = open ? " open" : "";
    const dowCls = d.dow === "日" ? " sun" : d.dow === "土" ? " sat" : "";

    const allDone = d.tasks.every(t => state.checks[t.id]);
    const doneCls = allDone && d.tasks.length > 0 ? " done" : "";

    let tasksHtml = "";
    d.tasks.forEach(t => {
      const checked = !!state.checks[t.id];
      tasksHtml += `<label class="task${checked?" done":""}" data-task="${t.id}">
        <input type="checkbox" ${checked?"checked":""}>
        <span class="task-label">${escapeHtml(t.label)}</span>
      </label>`;
    });

    // 今日のカードには前日までの未完了タスクを「繰り越し」として表示
    let carryHtml = "";
    if (isToday(d.date)) {
      const carry = getCarryoverTasks();
      if (carry.length) {
        let items = "";
        carry.forEach(c => {
          items += `<label class="task carryover" data-task="${c.id}">
            <input type="checkbox">
            <span class="task-label"><span class="carry-from">${c.from}</span>${escapeHtml(c.label)}</span>
          </label>`;
        });
        carryHtml = `<div class="day-section carryover-section">
          <div class="section-title">⚠ 繰り越し（前日までの未完了 ${carry.length}件）</div>
          ${items}
        </div>`;
      }
    }

    const actual = state.actualHours[d.date] || "";
    const note = state.notes[d.date] || "";

    html += `<div class="day-card${todayCls}${shiftCls}${openCls}${doneCls}" data-date="${d.date}">
      <div class="day-head" data-toggle="${d.date}">
        <div class="day-head-l">
          <div class="day-date">${d.date}</div>
          <div class="day-dow${dowCls}">${d.dow}</div>
          <div class="day-shift ${d.shiftClass}">${d.shift}</div>
        </div>
        <div>
          <span class="day-time">${actual||"0"}<span class="target">/${d.targetHours}h</span></span>
          <span class="toggle-arrow">▶</span>
        </div>
      </div>
      <div class="day-body">
        <div class="hint">勤務: ${d.workTime}${d.memo?"　／　"+escapeHtml(d.memo):""}</div>
        ${carryHtml}
        ${d.tasks.length ? `<div class="day-section">
          <div class="section-title">タスク</div>
          ${tasksHtml}
        </div>`:""}
        <div class="day-section">
          <div class="section-title">デッキ</div>
          <div class="day-decks-wrap" data-deckwrap="${d.date}">
            ${dayDeckSectionHtml(d.date)}
          </div>
        </div>
        <div class="day-section">
          <div class="time-row">
            <label>実績:</label>
            <input type="number" class="time-input" data-actual="${d.date}" value="${actual}" step="0.5" min="0" max="24" inputmode="decimal">
            <span class="time-target">/ 目標 ${d.targetHours}h</span>
          </div>
          <div class="time-row">
            <label>隙間問題:</label>
            <input type="number" class="time-input" data-gapq="${d.date}" value="${state.gapQuestions[d.date]||""}" step="1" min="0" max="999" inputmode="numeric" placeholder="0">
            <span class="time-target">問（通勤・夜勤隙間）</span>
          </div>
        </div>
        <div class="day-section">
          <div class="section-title">メモ</div>
          <textarea class="note-input" data-note="${d.date}" placeholder="気づき・苦手・続きから...">${escapeHtml(note)}</textarea>
        </div>
      </div>
    </div>`;
  });
  v.innerHTML = html;
  bindScheduleEvents();
}

function bindScheduleEvents() {
  document.querySelectorAll("[data-toggle]").forEach(el => {
    el.addEventListener("click", e => {
      if (e.target.closest("input, textarea, .task")) return;
      const date = el.getAttribute("data-toggle");
      state.openDates[date] = !state.openDates[date];
      const card = el.closest(".day-card");
      card.classList.toggle("open");
      saveState();
    });
  });
  document.querySelectorAll("#view-schedule .task").forEach(el => {
    el.addEventListener("click", e => {
      e.preventDefault();
      const id = el.getAttribute("data-task");
      state.checks[id] = !state.checks[id];
      saveState();
      // 同一タスクが「元の日」と「今日の繰り越し」の両方に出るため全体を再描画して同期
      const sy = window.scrollY;
      renderSchedule();
      renderHeader();
      window.scrollTo(0, sy);
    });
  });
  document.querySelectorAll("[data-actual]").forEach(el => {
    el.addEventListener("change", () => {
      const date = el.getAttribute("data-actual");
      const v = parseFloat(el.value);
      if (isNaN(v) || v < 0) { state.actualHours[date] = 0; }
      else { state.actualHours[date] = v; }
      saveState();
      renderHeader();
      // update card time display
      const card = el.closest(".day-card");
      const head = card.querySelector(".day-time");
      const day = SCHEDULE.find(d => d.date === date);
      head.innerHTML = (state.actualHours[date]||"0") + '<span class="target">/'+day.targetHours+'h</span>';
    });
  });
  document.querySelectorAll("[data-gapq]").forEach(el => {
    el.addEventListener("change", () => {
      const date = el.getAttribute("data-gapq");
      const v = parseInt(el.value, 10);
      if (isNaN(v) || v <= 0) { delete state.gapQuestions[date]; el.value = ""; }
      else { state.gapQuestions[date] = v; }
      saveState();
    });
  });
  document.querySelectorAll("[data-note]").forEach(el => {
    el.addEventListener("input", () => {
      const date = el.getAttribute("data-note");
      state.notes[date] = el.value;
      saveState();
    });
  });
  // デッキ欄（追加・削除・実施チェック）は部分更新方式でバインド
  bindDeckControls(document);
}

// ===== Decks view =====
// あるデッキを「実施した日数」(=回数) を数える
function deckRepCount(id) {
  let n = 0;
  for (const date in state.deckDoneByDate) {
    if (state.deckDoneByDate[date] && state.deckDoneByDate[date][id]) n++;
  }
  return n;
}
function deckStats() {
  let total = 0, done = 0;
  DECK_GROUPS.forEach(g => g.decks.forEach(d => {
    total++;
    if (deckRepCount(d.id) > 0) done++;
  }));
  return { total, done };
}

function renderDecks() {
  const v = document.getElementById("view-decks");
  const ds = deckStats();
  const pct = ds.total ? Math.round(ds.done / ds.total * 100) : 0;

  // --- 実施回数（5段階ピップ）一覧 ---
  let listHtml = "";
  DECK_GROUPS.forEach(g => {
    listHtml += `<div class="deck-cat">${escapeHtml(g.cat)}</div>`;
    g.decks.forEach(d => {
      const reps = deckRepCount(d.id);
      const shown = Math.min(reps, 5);
      let pips = "";
      for (let i = 1; i <= 5; i++) pips += `<span class="pip${i<=shown?" on":""}"></span>`;
      listHtml += `<div class="deck-pip-row${reps>0?" started":""}">
        <span class="deck-name">${escapeHtml(d.name)}</span>
        <span class="deck-pips">${pips}</span>
        <span class="deck-rep-count">${reps}/5</span>
      </div>`;
    });
  });

  v.innerHTML = `
    <div class="stat-card">
      <h3>デッキ実施回数（最大5回）</h3>
      <div class="big-num">${ds.done}<span class="unit"> / ${ds.total} デッキ着手</span></div>

      ${listHtml}
    </div>
  `;
}

// ===== Study material view (教材＋確認テスト) =====
function quizStats() {
  let total = 0, ans = 0, correct = 0;
  if (typeof STUDY_DATA === "undefined") return { total:0, ans:0, correct:0, wrong:0 };
  for (const sec in STUDY_DATA) {
    (STUDY_DATA[sec].quiz || []).forEach(q => {
      total++;
      const r = state.quiz[sec + "#" + q.n];
      if (r) { ans++; if (r.r === "o") correct++; }
    });
  }
  return { total, ans, correct, wrong: ans - correct };
}

function quizHtml(sec, quiz) {
  return quiz.map(q => {
    const qid = sec + "#" + q.n;
    const res = state.quiz[qid];
    const correctIdx = "ABCD".indexOf(q.a);
    const choices = q.c.map((c, i) => {
      let cls = "quiz-choice";
      if (res) {
        if (i === correctIdx) cls += " correct";
        else if (res.r === "x" && i === res.c) cls += " wrong";
      }
      return `<button class="${cls}" data-quiz="${qid}" data-ci="${i}">${"ABCD"[i]}. ${escapeHtml(c)}</button>`;
    }).join("");
    const badge = res ? (res.r === "o" ? '<span class="quiz-badge ok">正解</span>' : '<span class="quiz-badge ng">不正解</span>') : "";
    return `<div class="quiz-q">
      <div class="quiz-qtext">Q${escapeHtml(q.n)}. ${escapeHtml(q.q)}${badge}</div>
      <div class="quiz-choices">${choices}</div>
      <div class="quiz-exp${res?"":" hidden"}">正解: ${escapeHtml(q.a)}　${escapeHtml(q.e)}</div>
    </div>`;
  }).join("");
}

function bindStudyEvents() {
  document.querySelectorAll("[data-studytoggle]").forEach(el => {
    el.addEventListener("click", () => {
      const sec = el.getAttribute("data-studytoggle");
      state.studyOpen[sec] = !state.studyOpen[sec];
      el.closest(".study-sec").classList.toggle("open");
      saveState();
    });
  });
  document.querySelectorAll("#view-study .quiz-choice").forEach(el => {
    el.addEventListener("click", () => {
      const qid = el.getAttribute("data-quiz");
      const ci = parseInt(el.getAttribute("data-ci"), 10);
      const sec = qid.split("#")[0], n = qid.split("#")[1];
      const q = (STUDY_DATA[sec].quiz || []).find(x => x.n === n);
      if (!q) return;
      const correctIdx = "ABCD".indexOf(q.a);
      const ok = ci === correctIdx;
      state.quiz[qid] = { r: ok ? "o" : "x", c: ci };
      saveState();
      const block = el.closest(".quiz-q");
      block.querySelectorAll(".quiz-choice").forEach((b, i) => {
        b.classList.remove("correct", "wrong");
        if (i === correctIdx) b.classList.add("correct");
        if (i === ci && !ok) b.classList.add("wrong");
      });
      const exp = block.querySelector(".quiz-exp");
      if (exp) exp.classList.remove("hidden");

      const card = document.querySelector("#view-study .stat-card");
      if (card) {
        const rows = card.querySelectorAll(".kv-row .v");

        if (rows[1]) rows[1].textContent = s.correct + " / " + s.wrong;
      }
    });
  });
}

// ===== Flashcard (単語帳) =====
// セッション状態（quiz中のみ使用・saveStateには入れない）
let _fSession = null; // { settings, cards:[{type,id,front,back,html,blanks}], idx, results:[] }

const ALL_SECS = ["1-1","1-2","1-3","1-4","1-5","1-6","1-7","1-8","1-9","2-1","2-2","2-3","2-4","2-5","3-1","3-2","3-3","3-4","3-5"];

function flashAvailable() { return typeof VOCAB_CARDS !== "undefined" && typeof DIAGRAM_CARDS !== "undefined"; }

// 節ごとのカード枚数を返す { vocab: n, diagram: n }
function secCardCounts(sec) {
  const v = (VOCAB_CARDS[sec] && VOCAB_CARDS[sec].cards) ? VOCAB_CARDS[sec].cards.length : 0;
  const d = DIAGRAM_CARDS.filter(x => x.sec === sec).length;
  return { vocab: v, diagram: d };
}

// 設定に合わせてカードを生成
function buildFlashCards(settings) {
  const { secs, useVocab, useDiagram, count, direction } = settings;
  let cards = [];
  if (useVocab) {
    secs.forEach(sec => {
      const grp = VOCAB_CARDS[sec]; if (!grp) return;
      grp.cards.forEach(c => {
        // direction: "normal"=用語→意味, "reverse"=意味→用語, "random"=ランダム
        const rev = direction === "reverse" || (direction === "random" && Math.random() < 0.5);
        cards.push({ type:"vocab", id:c.id, sec, cat:c.cat,
          front: rev ? c.def  : c.term,
          back:  rev ? c.term : c.def,
          reversed: rev });
      });
    });
  }
  if (useDiagram) {
    DIAGRAM_CARDS.forEach(d => {
      if (secs.includes(d.sec)) cards.push({ type:"diagram", id:d.id, sec:d.sec, front:d.title, back:d.desc, html:d.html, blanks:d.blanks });
    });
  }
  // shuffle
  for (let i = cards.length-1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [cards[i],cards[j]]=[cards[j],cards[i]]; }
  return cards.slice(0, Math.min(count, cards.length));
}

function flashLifetimeStats() {
  if (!flashAvailable()) return {};
  const stats = {}; // id -> { ok, total }
  state.flashSessions.forEach(s => {
    (s.results||[]).forEach(r => {
      if (!stats[r.id]) stats[r.id] = { ok:0, total:0 };
      stats[r.id].total++;
      if (r.ok) stats[r.id].ok++;
    });
  });
  return stats;
}

// ─── 図解 虫食いクイズ ───
function renderFlashDiagramQuiz(cards, idx) {
  const v = document.getElementById("view-flash");
  const card = cards[idx];
  const total = cards.length;
  const pct = Math.round(idx / total * 100);
  const rate = (window._fClozeRate || 50) / 100;

  // ── 各空欄を確率 rate で「隠す」か「見せる」か決定 ──
  const mask = card.blanks.map(b => ({
    ...b,
    hidden: Math.random() < rate
  }));
  // 1つも隠れていなければ最低1つ隠す
  if (mask.length > 0 && !mask.some(m => m.hidden)) {
    mask[Math.floor(Math.random() * mask.length)].hidden = true;
  }

  // ── HTMLを変換（空欄スパン単位で hidden/shown を切り替え）──
  let spanIdx = 0;   // <span class="blank"> の出現順カウンタ
  let legIdx  = 0;   // dc-blank-legend <b> の出現順カウンタ

  const quizHtml = card.html
    // テーブル内の <span class="blank" data-answer="...">...</span>
    .replace(/<span class="blank" data-answer="[^"]*">[^<]*<\/span>/g, () => {
      const m = mask[spanIdx++];
      if (!m) return "";
      if (m.hidden) {
        // 非表示 → 黄枠「？」+ カウンタ番号
        return `<span class="blank diag-blank-hidden" data-bid="${escapeHtml(m.id)}">？<sub>${spanIdx}</sub></span>`;
      } else {
        // 表示 → 答えが見える（緑っぽい色）
        return `<span class="blank diag-blank-shown">${escapeHtml(m.answer)}</span>`;
      }
    })
    // dc-blank-legend の <b data-answer="...">[?]</b>
    .replace(/<b data-answer="[^"]*">\[\?\]<\/b>/g, () => {
      const m = mask[legIdx++];
      if (!m) return "";
      if (m.hidden) {
        return `<b class="diag-legend-blank" data-bid="${escapeHtml(m.id)}">[？]</b>`;
      } else {
        return `<b class="diag-legend-shown">${escapeHtml(m.answer)}</b>`;
      }
    });

  const hiddenMasks = mask.filter(m => m.hidden);
  const shownCount  = mask.length - hiddenMasks.length;

  v.innerHTML = `
    <div class="flash-header">
      <button class="btn" id="dqBackBtn">← 戻る</button>
      <div class="flash-progress">${idx+1} / ${total}</div>
      <div style="font-size:11px;color:var(--warn);font-weight:700">虫食い ${window._fClozeRate||50}%</div>
    </div>
    <div class="progress-bar" style="margin:6px 0 10px"><div class="progress-fill" style="width:${pct}%;background:var(--warn)"></div></div>
    <div class="stat-card diag-quiz-card">
      <div class="diag-sec-label">${card.sec} ${escapeHtml(card.secTitle)}</div>
      <div class="diag-title">${escapeHtml(card.title)}</div>
      <div class="diag-desc">${escapeHtml(card.back)}</div>
      <div class="diag-mask-info">
        <span class="mask-hidden">❓ 空欄: ${hiddenMasks.length}個</span>
        <span class="mask-shown">✓ 表示: ${shownCount}個</span>
      </div>
      <div class="flash-diagram-body diag-quiz-body">${quizHtml}</div>
      <hr style="border-color:var(--border);margin:12px 0">
      <div id="dqInputs" class="flash-blank-inputs"></div>
    </div>
    <div id="dqActionRow" class="flash-answer-row">
      <button class="btn flash-check" id="dqCheckBtn"
        style="background:var(--warn);border-color:var(--warn)">
        答え合わせ（${hiddenMasks.length}問）
      </button>
    </div>
    <div class="diag-nav-row">
      ${idx>0 ? `<button class="btn" id="dqPrevBtn">← 前の図</button>` : "<div></div>"}
      ${idx<total-1 ? `<button class="btn" id="dqNextBtn">次の図 →</button>`
                    : `<button class="btn" id="dqFinBtn" style="color:var(--ok)">✓ 完了</button>`}
    </div>
  `;

  // ── 入力欄（隠れている空欄のみ）──
  const inputsEl = document.getElementById("dqInputs");
  let inputsHtml = "";
  hiddenMasks.forEach((m, i) => {
    inputsHtml += `
      <div class="flash-blank-row">
        <span class="flash-blank-num">${i+1}</span>
        <input class="flash-blank-input" id="dqi_${m.id}"
          placeholder="？ の答えを入力..." autocomplete="off" inputmode="text">
        <span class="flash-blank-hint hidden" id="dqh_${m.id}"></span>
      </div>`;
  });
  inputsEl.innerHTML = inputsHtml || '<div class="hint">（全空欄が表示されています）</div>';

  // ── 答え合わせ ──
  document.getElementById("dqCheckBtn").addEventListener("click", () => {
    const normalize = s =>
      s.replace(/\s/g,"")
       .replace(/[Ａ-Ｚａ-ｚ０-９]/g, c => String.fromCharCode(c.charCodeAt(0)-0xFEE0))
       .toLowerCase();
    let allOk = true;
    hiddenMasks.forEach(m => {
      const inp  = document.getElementById("dqi_"+m.id);
      const hint = document.getElementById("dqh_"+m.id);
      if (!inp) return;
      const val = (inp.value||"").trim();
      const ok  = normalize(val) === normalize(m.answer)
               || (normalize(m.answer).includes(normalize(val)) && normalize(val).length >= 2);
      inp.style.borderColor = ok ? "var(--ok)" : "var(--bad)";
      hint.textContent = `正解: ${m.answer}`;
      hint.classList.remove("hidden");
      hint.style.color = ok ? "var(--ok)" : "var(--bad)";
      if (!ok) allOk = false;

      // 図内の「？」にも答えを書き込む
      v.querySelectorAll(`[data-bid="${m.id}"]`).forEach(el => {
        el.textContent = m.answer;
        el.style.background = ok ? "rgba(76,175,80,0.25)" : "rgba(239,83,80,0.25)";
        el.style.borderColor = ok ? "var(--ok)" : "var(--bad)";
        el.style.color       = ok ? "var(--ok)" : "var(--bad)";
      });
    });
    document.getElementById("dqActionRow").innerHTML =
      `<span style="font-size:14px;font-weight:700;color:${allOk?"var(--ok)":"var(--bad)"}">
         ${allOk ? "✓ 全問正解！" : "✗ 不正解あり（赤を確認）"}
       </span>`;
    showToast(allOk ? "全問正解！" : "赤い欄を確認してください");
  });

  document.getElementById("dqBackBtn").addEventListener("click", () => renderFlash());
  document.getElementById("dqPrevBtn")?.addEventListener("click", () => renderFlashDiagramQuiz(cards, idx-1));
  document.getElementById("dqNextBtn")?.addEventListener("click", () => renderFlashDiagramQuiz(cards, idx+1));
  document.getElementById("dqFinBtn")?.addEventListener("click", () => {
    showToast("図解虫食いクイズ完了！");
    renderFlash();
  });
}

// ─── カード表示画面 ───
function renderFlashCard() {
  const v = document.getElementById("view-flash");
  if (!_fSession || !_fSession.active) { renderFlash(); return; }
  const { cards, idx, results } = _fSession;
  const card = cards[idx];
  const progress = `${idx+1} / ${cards.length}`;
  const pct = Math.round(idx/cards.length*100);

  if (card.type === "vocab") {
    const dirLabel = card.reversed ? '<span class="dir-badge rev">意味→用語</span>' : '<span class="dir-badge">用語→意味</span>';
    v.innerHTML = `
      <div class="flash-header">
        <button class="btn" id="fQuitBtn">中断</button>
        <div class="flash-progress">${progress}</div>
        <div style="font-size:11px;color:var(--muted)">${card.sec} ${dirLabel}</div>
      </div>
      <div class="progress-bar" style="margin:6px 0 10px"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="flash-vocab-card" id="flashCard">
        <div class="flash-face front" id="flashFront">
          <div class="flash-cat">${escapeHtml(card.cat||card.sec)}</div>
          <div class="${card.reversed?"flash-def":"flash-term"}">${escapeHtml(card.front)}</div>
          <div class="flash-tap-hint">タップして答えを見る</div>
        </div>
        <div class="flash-face back hidden" id="flashBack">
          <div class="flash-cat">${escapeHtml(card.reversed?"答え":"用語")}: ${escapeHtml(card.front)}</div>
          <div class="${card.reversed?"flash-term":"flash-def"}">${escapeHtml(card.back)}</div>
        </div>
      </div>
      <div class="flash-answer-row hidden" id="flashAnswerRow">
        <button class="btn flash-ng" id="fNgBtn">✗ 不正解</button>
        <button class="btn flash-ok" id="fOkBtn">✓ 正解</button>
      </div>
    `;
    document.getElementById("flashCard").addEventListener("click", () => {
      document.getElementById("flashFront").classList.add("hidden");
      document.getElementById("flashBack").classList.remove("hidden");
      document.getElementById("flashAnswerRow").classList.remove("hidden");
    });
  } else {
    // diagram: 穴埋め形式
    const answered = _fSession.diagramAnswers || {};
    v.innerHTML = `
      <div class="flash-header">
        <button class="btn" id="fQuitBtn">中断</button>
        <div class="flash-progress">${progress}</div>
        <div style="font-size:11px;color:var(--muted)">${card.sec} 図解</div>
      </div>
      <div class="progress-bar" style="margin:6px 0 10px"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="stat-card" style="padding:12px">
        <div style="font-size:14px;font-weight:700;color:var(--accent);margin-bottom:4px">${escapeHtml(card.front)}</div>
        <div style="font-size:12px;color:var(--muted);margin-bottom:10px">${escapeHtml(card.back)}</div>
        <div class="flash-diagram-body">${card.html}</div>
        <div id="flashBlankInputs" class="flash-blank-inputs"></div>
      </div>
      <div class="flash-answer-row" id="flashAnswerRow">
        <button class="btn flash-check" id="fCheckBtn">答え合わせ</button>
      </div>
    `;
    // ブランクを入力欄に変換
    const blankInputsEl = document.getElementById("flashBlankInputs");
    let inputsHtml = "";
    card.blanks.forEach((b,i) => {
      inputsHtml += `<div class="flash-blank-row">
        <span class="flash-blank-num">${i+1}</span>
        <input class="flash-blank-input" id="fbi_${b.id}" placeholder="答えを入力..." autocomplete="off" inputmode="text">
        <span class="flash-blank-hint hidden" id="fbh_${b.id}" data-answer="${escapeHtml(b.answer)}"></span>
      </div>`;
    });
    blankInputsEl.innerHTML = inputsHtml;

    document.getElementById("fCheckBtn").addEventListener("click", () => {
      let allOk = true;
      card.blanks.forEach(b => {
        const inp = document.getElementById("fbi_"+b.id);
        const hint = document.getElementById("fbh_"+b.id);
        const val = (inp.value||"").trim();
        // 正解判定（全角半角・スペース無視・部分一致も考慮）
        const normalize = s => s.replace(/\s/g,"").replace(/[Ａ-Ｚａ-ｚ０-９]/g,c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0));
        const ok = normalize(val).toLowerCase() === normalize(b.answer).toLowerCase()
          || normalize(b.answer).includes(normalize(val)) && normalize(val).length >= 2;
        inp.style.borderColor = ok ? "var(--ok)" : "var(--bad)";
        hint.textContent = `正解: ${b.answer}`;
        hint.classList.remove("hidden");
        hint.style.color = ok ? "var(--ok)" : "var(--bad)";
        if (!ok) allOk = false;
      });
      // 正解ボタンに変える
      const row = document.getElementById("flashAnswerRow");
      row.innerHTML = `
        <button class="btn flash-ng" id="fNgBtn">✗ 間違いあり</button>
        <button class="btn flash-ok" id="fOkBtn">✓ 全部正解</button>
      `;
      if (allOk) document.getElementById("fOkBtn").classList.add("pulse");
      document.getElementById("fNgBtn").addEventListener("click", () => recordFlashResult(false));
      document.getElementById("fOkBtn").addEventListener("click", () => recordFlashResult(true));
    });
  }

  document.getElementById("fQuitBtn")?.addEventListener("click", () => {
    if (!confirm("中断してよいですか？（ここまでの結果は保存されます）")) return;
    finishFlashSession();
  });
  document.getElementById("fNgBtn")?.addEventListener("click", () => recordFlashResult(false));
  document.getElementById("fOkBtn")?.addEventListener("click", () => recordFlashResult(true));
}

function recordFlashResult(ok) {
  const card = _fSession.cards[_fSession.idx];
  _fSession.results.push({ id:card.id, sec:card.sec, type:card.type, ok });
  _fSession.idx++;
  if (_fSession.idx >= _fSession.cards.length) { finishFlashSession(); return; }
  renderFlashCard();
  window.scrollTo({ top:0, behavior:"smooth" });
}

function finishFlashSession() {
  if (!_fSession) return;
  const results = _fSession.results;
  const ok = results.filter(r=>r.ok).length;
  const total = results.length;
  const pct = total ? Math.round(ok/total*100) : 0;
  const goal = _fSession.settings.goal||80;
  // セッション保存
  state.flashSessions.push({
    date: _fSession.date,
    settings: _fSession.settings,
    results,
    score: pct
  });
  // 直近100セッションのみ保持
  if (state.flashSessions.length > 100) state.flashSessions = state.flashSessions.slice(-100);
  saveState();
  _fSession = null;

  // 結果画面
  const v = document.getElementById("view-flash");
  const badge = pct>=goal ? '<span class="score-badge pass">目標達成！</span>' : '<span class="score-badge fail">目標未達</span>';
  const lastResults = state.flashSessions[state.flashSessions.length-1].results;
  let wrongHtml = "";
  lastResults.filter(r=>!r.ok).forEach(r => {
    // カードの用語/タイトルを引く
    let label = r.id;
    if (r.type==="vocab") {
      const grp = VOCAB_CARDS[r.sec];
      if (grp) { const c = grp.cards.find(c=>c.id===r.id); if(c) label = c.term; }
    } else {
      const d = DIAGRAM_CARDS.find(d=>d.id===r.id); if(d) label = d.title;
    }
    wrongHtml += `<div class="kv-row"><span style="font-size:12px">${r.sec} ${escapeHtml(label)}</span><span style="color:var(--bad);font-size:11px">✗</span></div>`;
  });
  v.innerHTML = `
    <div class="stat-card" style="text-align:center">
      <h3>クイズ結果</h3>
      <div class="big-num" style="margin:12px 0">${pct}<span class="unit">%</span></div>
      <div style="margin-bottom:8px">${ok} / ${total} 正解　${badge}</div>
      <div style="font-size:12px;color:var(--muted)">目標: ${goal}%</div>
    </div>
    ${wrongHtml ? `<div class="stat-card"><h3>間違えたカード（${lastResults.filter(r=>!r.ok).length}件）</h3>${wrongHtml}</div>` : '<div class="stat-card"><h3>🎉 全問正解！</h3></div>'}
    <button class="btn primary" id="fRetryBtn" style="width:100%;padding:14px;font-size:15px;margin-top:4px">もう一度</button>
    <button class="btn" id="fHomeBtn" style="width:100%;padding:12px;margin-top:6px">設定に戻る</button>
  `;
  document.getElementById("fRetryBtn").addEventListener("click", () => {
    const prev = state.flashSessions[state.flashSessions.length-1];
    const cards = buildFlashCards(prev.settings);
    _fSession = { active:true, cards, idx:0, results:[], settings:prev.settings, date:getToday() };
    renderFlashCard();
  });
  document.getElementById("fHomeBtn").addEventListener("click", () => renderFlash());
}

// ===== Exam view =====
function renderExam() {
  const v = document.getElementById("view-exam");
  let html = '<div class="stat-card"><h3>模擬試験スコア記録</h3>';
  EXAMS.forEach(ex => {
    const score = state.examScores[ex.id] || "";
    let badge = '<span class="score-badge empty">未</span>';
    if (score !== "") {
      const sc = parseFloat(score);
      const isMain = ex.id === "main";
      if (isMain) {
        if (sc >= 720) badge = '<span class="score-badge pass">合格</span>';
        else if (sc >= 650) badge = '<span class="score-badge near">惜</span>';
        else badge = '<span class="score-badge fail">要</span>';
      } else {
        let threshold = 70;
        if (ex.id === "mock1") threshold = 60;
        if (ex.id === "mock4") threshold = 80;
        if (sc >= threshold) badge = '<span class="score-badge pass">達</span>';
        else if (sc >= threshold - 10) badge = '<span class="score-badge near">近</span>';
        else badge = '<span class="score-badge fail">要</span>';
      }
    }
    const placeholder = ex.id === "main" ? "点数" : "%";
    html += `<div class="exam-row">
      <div>
        <div class="exam-name">${ex.name}</div>
        <span class="exam-target">目標: ${ex.target}</span>
      </div>
      <input type="number" class="exam-score-input" data-exam="${ex.id}" value="${score}" placeholder="${placeholder}" inputmode="decimal">
      ${badge}
    </div>`;
  });
  html += '</div>';

  html += `<div class="stat-card">
    <h3>直前週の心得</h3>
    <div style="font-size:13px; line-height:1.7">
      <div>・<b>6/7 夜勤2日目前</b>：絶対に休む（勉強NG）</div>
      <div>・<b>6/8 夜勤明け</b>：模擬④の復習のみ・新範囲NG</div>
      <div>・<b>6/9 前日</b>：苦手箇所のみ・21時就寝厳守</div>
      <div>・<b>6/10 試験日</b>：体調最優先・食事と水分</div>
    </div>
  </div>`;

  v.innerHTML = html;
  document.querySelectorAll("[data-exam]").forEach(el => {
    el.addEventListener("change", () => {
      const id = el.getAttribute("data-exam");
      const v = el.value.trim();
      if (v === "") delete state.examScores[id];
      else state.examScores[id] = parseFloat(v);
      saveState();
      renderExam();
    });
  });
}

function exportData() {
  const data = JSON.stringify(state, null, 2);
  const blob = new Blob([data], { type:"application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "saa_study_backup_" + new Date().toISOString().slice(0,10) + ".json";
  a.click();
  URL.revokeObjectURL(url);
  state.lastBackup = Date.now();
  saveState();
  showToast("エクスポートしました");
  if (document.getElementById("view-settings").classList.contains("active")) renderSettings();
}

// ===== Backup status helpers =====
function daysSinceBackup() {
  if (!state.lastBackup) return null;
  return Math.floor((Date.now() - state.lastBackup) / 86400000);
}
function hasAnyData() {
  return Object.keys(state.checks).length || Object.keys(state.actualHours).length ||
         Object.keys(state.gapQuestions).length || Object.keys(state.examScores).length ||
         Object.keys(state.deckDone).length || Object.keys(state.deckDoneByDate).length;
}
function backupOverdue() {
  if (!hasAnyData()) return false;
  const d = daysSinceBackup();
  return d === null || d >= 3;
}
function backupStatusText() {
  const d = daysSinceBackup();
  if (d === null) return "⚠ まだバックアップしていません。エクスポートを推奨します。";
  if (d === 0) return "✓ 今日バックアップ済み";
  if (d === 1) return "前回バックアップ: 昨日";
  return (backupOverdue() ? "⚠ " : "") + "前回バックアップ: " + d + "日前";
}
function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      state = Object.assign({ checks:{}, actualHours:{}, gapQuestions:{}, notes:{}, examScores:{}, openDates:{}, deckDone:{}, deckDoneByDate:{}, dayDecks:{}, lastBackup:0, decksSeeded:false, quiz:{}, studyOpen:{}, flashSessions:[], flashGoals:{} }, data);
      saveState();
      seedDefaultDecks();
      renderAll();
      showToast("インポートしました");
    } catch(err) { showToast("ファイルが不正です"); }
  };
  reader.readAsText(file);
}

// ===== Misc =====
function escapeHtml(s) {
  if (s == null) return "";
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
}
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => t.classList.remove("show"), 1500);
}

function switchView(name) {
  document.querySelectorAll(".tab").forEach(t => t.classList.toggle("active", t.getAttribute("data-view") === name));
  document.querySelectorAll(".view").forEach(v => v.classList.toggle("active", v.id === "view-" + name));
  if (name === "study") renderStudy();
  if (name === "flash") renderFlash();
  if (name === "decks") renderDecks();
  if (name === "stats") renderStats();
  if (name === "exam") renderExam();
  if (name === "settings") renderSettings();
  window.scrollTo({ top:0, behavior:"smooth" });
}

function scrollToToday() {
  switchView("schedule");
  setTimeout(() => {
    const today = getToday();
    const el = document.querySelector(`[data-date="${today}"]`);
    if (el) {
      el.scrollIntoView({ behavior:"smooth", block:"start" });
      el.classList.add("open");
      state.openDates[today] = true;
      saveState();
    } else {
      showToast("今日は期間外です");
    }
  }, 100);
}

function renderAll() {
  renderHeader();
  renderSchedule();
}

// ===== Init =====
document.querySelectorAll(".tab").forEach(t => {
  t.addEventListener("click", () => switchView(t.getAttribute("data-view")));
});
document.getElementById("today-btn").addEventListener("click", scrollToToday);

loadState();
seedDefaultDecks();
renderAll();

// auto-scroll to today on first load
setTimeout(() => {
  const today = getToday();
  const el = document.querySelector(`[data-date="${today}"]`);
  if (el) el.scrollIntoView({ behavior:"auto", block:"center" });
}, 100);

// バックアップ催促（記録があり、3日以上未バックアップなら起動時にそっと通知）
setTimeout(() => { if (backupOverdue()) showToast("バックアップ推奨：設定→エクスポート"); }, 1300);

// ===== Register Service Worker + 更新検知 (http/https のみ) =====
let swRegistration = null;
function showUpdateBanner() {
  const b = document.getElementById("update-banner");
  if (b) b.classList.add("show");
}
const updateBtn = document.getElementById("update-btn");
if (updateBtn) {
  updateBtn.addEventListener("click", () => {
    if (swRegistration && swRegistration.waiting) {
      swRegistration.waiting.postMessage({ type:"SKIP_WAITING" });
    } else {
      window.location.reload();
    }
  });
}
if ("serviceWorker" in navigator && location.protocol.startsWith("http")) {
  let reloaded = false;
  navigator.serviceWorker.addEventListener("controllerchange", () => {
    if (reloaded) return;
    reloaded = true;
    window.location.reload();
  });
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").then((reg) => {
      swRegistration = reg;
      // 既に待機中の新版があればすぐ通知
      if (reg.waiting && navigator.serviceWorker.controller) showUpdateBanner();
      // 新版を検知したら通知
      reg.addEventListener("updatefound", () => {
        const nw = reg.installing;
        if (!nw) return;
        nw.addEventListener("statechange", () => {
          if (nw.state === "installed" && navigator.serviceWorker.controller) showUpdateBanner();
        });
      });
    }).catch((err) => console.warn("[SW] register failed:", err));
    // アプリに戻ってきたタイミングで更新チェック
    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "visible" && swRegistration) swRegistration.update().catch(()=>{});
    });
  });
}
</script>
