<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>SAA スキマクイズ</title>
<style>
  :root{
    --bg:#f4f6f9; --card:#ffffff; --text:#1f2937; --sub:#6b7280;
    --line:#e5e7eb; --accent:#2563eb; --accent2:#1d4ed8;
    --ok:#16a34a; --okbg:#dcfce7; --ng:#dc2626; --ngbg:#fee2e2;
    --btn:#f3f4f6; --shadow:0 1px 3px rgba(0,0,0,.08);
  }
  body.bed{
    --bg:#15171c; --card:#1e2128; --text:#e8e2d6; --sub:#9aa0aa;
    --line:#2c2f37; --accent:#c79a5b; --accent2:#b1854a;
    --ok:#6fbf73; --okbg:#21331f; --ng:#e08585; --ngbg:#3a2222;
    --btn:#262a31; --shadow:none;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Kaku Gothic ProN",Meiryo,sans-serif;
    line-height:1.6;padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);transition:background .2s}
  .wrap{max-width:560px;margin:0 auto;padding:14px}
  header{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px}
  h1{font-size:20px;margin:0;font-weight:800}
  .modeToggle{display:flex;background:var(--btn);border-radius:999px;padding:3px;font-size:12px;font-weight:700}
  .modeToggle button{border:0;background:transparent;color:var(--sub);padding:6px 12px;border-radius:999px;cursor:pointer}
  .modeToggle button.on{background:var(--accent);color:#fff}
  body.bed .modeToggle button.on{color:#1a1208}
  nav{display:flex;gap:6px;margin-bottom:12px}
  nav button{flex:1;border:0;background:var(--btn);color:var(--sub);padding:9px;border-radius:10px;font-weight:700;font-size:14px;cursor:pointer}
  nav button.on{background:var(--card);color:var(--accent);box-shadow:var(--shadow)}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;box-shadow:var(--shadow);margin-bottom:12px}
  .lead{color:var(--sub);font-size:13px;margin:0 0 12px}
  .pick{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
  .pick button{border:1px solid var(--line);background:var(--card);color:var(--text);padding:13px 10px;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;text-align:left}
  .pick button .n{display:block;font-size:11px;color:var(--sub);font-weight:600;margin-top:2px}
  .startbtn{width:100%;border:0;background:var(--accent);color:#fff;padding:15px;border-radius:12px;font-size:17px;font-weight:800;cursor:pointer;margin-top:4px}
  body.bed .startbtn{color:#1a1208}
  .startbtn:disabled{opacity:.45}
  .count{display:flex;gap:8px;margin:10px 0}
  .count button{flex:1;border:1px solid var(--line);background:var(--card);color:var(--text);padding:10px;border-radius:10px;font-weight:700;cursor:pointer}
  .count button.on{border-color:var(--accent);color:var(--accent)}
  /* quiz */
  .prog{display:flex;align-items:center;justify-content:space-between;font-size:13px;color:var(--sub);margin-bottom:8px}
  .bar{height:6px;background:var(--btn);border-radius:99px;overflow:hidden;margin-bottom:14px}
  .bar > i{display:block;height:100%;background:var(--accent);width:0;transition:width .25s}
  .tag{display:inline-block;font-size:11px;font-weight:700;color:var(--accent);background:var(--btn);padding:3px 9px;border-radius:99px;margin-bottom:10px}
  .q{font-size:17px;font-weight:700;margin:0 0 14px}
  .choices button{display:block;width:100%;text-align:left;border:1.5px solid var(--line);background:var(--card);color:var(--text);
    padding:14px 14px;border-radius:12px;font-size:15px;margin-bottom:9px;cursor:pointer;transition:.12s}
  .choices button:active{transform:scale(.99)}
  .choices button.correct{border-color:var(--ok);background:var(--okbg)}
  .choices button.wrong{border-color:var(--ng);background:var(--ngbg)}
  .choices button.dim{opacity:.55}
  .choices button .lab{font-weight:800;color:var(--sub);margin-right:8px}
  .explain{border-radius:12px;padding:13px;margin-top:4px;font-size:14px;border:1px solid var(--line);background:var(--btn)}
  .explain .res{font-weight:800;margin-bottom:6px}
  .explain .res.ok{color:var(--ok)} .explain .res.ng{color:var(--ng)}
  .explain .mn{margin-top:8px;padding-top:8px;border-top:1px dashed var(--line);color:var(--sub)}
  .explain .mn b{color:var(--text)}
  .nextbtn{width:100%;border:0;background:var(--accent);color:#fff;padding:14px;border-radius:12px;font-size:16px;font-weight:800;cursor:pointer;margin-top:12px}
  body.bed .nextbtn{color:#1a1208}
  /* review */
  .stat{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--line)}
  .stat:last-child{border-bottom:0}
  .stat .name{font-weight:700}
  .stat .pct{font-weight:800}
  .stat .pct.low{color:var(--ng)} .stat .pct.mid{color:#d97706} .stat .pct.hi{color:var(--ok)}
  .mini{height:6px;background:var(--btn);border-radius:99px;overflow:hidden;width:90px}
  .mini > i{display:block;height:100%}
  .big{font-size:34px;font-weight:800;text-align:center;margin:4px 0}
  .sub{text-align:center;color:var(--sub);font-size:13px;margin-bottom:6px}
  .row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
  .row button{flex:1;min-width:120px;border:1px solid var(--line);background:var(--card);color:var(--text);padding:12px;border-radius:11px;font-weight:700;cursor:pointer}
  .row button.pri{background:var(--accent);color:#fff;border:0}
  body.bed .row button.pri{color:#1a1208}
  textarea{width:100%;min-height:120px;border:1px solid var(--line);border-radius:10px;background:var(--bg);color:var(--text);padding:10px;font-size:12px;font-family:ui-monospace,Menlo,Consolas,monospace}
  .hint{font-size:12px;color:var(--sub);margin:6px 0 0}
  .empty{text-align:center;color:var(--sub);padding:24px 0}
  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:10px 18px;border-radius:99px;font-weight:700;font-size:14px;opacity:0;pointer-events:none;transition:.2s}
  .toast.show{opacity:1}
  a.link{color:var(--accent);font-size:13px;text-decoration:none}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>📚 SAA スキマクイズ</h1>
    <div class="modeToggle">
      <button id="mCommute" class="on" onclick="setMode('commute')">🚃通勤</button>
      <button id="mBed" onclick="setMode('bed')">🛏ベッド</button>
    </div>
  </header>
  <nav>
    <button id="navHome" class="on" onclick="show('home')">出題</button>
    <button id="navReview" onclick="show('review')">復習・結果</button>
    <button id="navData" onclick="show('data')">書出/読込</button>
  </nav>

  <!-- HOME -->
  <section id="home">
    <div class="card">
      <p class="lead">弱点に絞った問題を出します。片手でサクッと。間違えた問題は「復習・結果」に貯まります。</p>
      <div class="pick" id="pickField"></div>
      <div class="count">
        <button class="on" data-n="10" onclick="setCount(10)">10問</button>
        <button data-n="20" onclick="setCount(20)">20問</button>
        <button data-n="0" onclick="setCount(0)">全部</button>
      </div>
      <button class="startbtn" id="startBtn" onclick="startQuiz()">スタート</button>
      <p class="hint" id="poolInfo"></p>
    </div>
  </section>

  <!-- QUIZ -->
  <section id="quiz" style="display:none">
    <div class="prog"><span id="qPos"></span><span id="qScore"></span></div>
    <div class="bar"><i id="qBar"></i></div>
    <div class="card">
      <span class="tag" id="qTag"></span>
      <p class="q" id="qText"></p>
      <div class="choices" id="qChoices"></div>
      <div id="qExplain"></div>
      <button class="nextbtn" id="qNext" style="display:none" onclick="nextQ()">次へ ▶</button>
    </div>
    <button class="row" style="border:0;background:transparent;color:var(--sub);width:100%;cursor:pointer;font-size:13px" onclick="abortQuiz()">← やめて戻る</button>
  </section>

  <!-- REVIEW -->
  <section id="review" style="display:none">
    <div class="card" id="reviewSummary"></div>
    <div class="card">
      <p class="lead" style="margin-bottom:8px">分野別の正答率（低い＝弱点）</p>
      <div id="reviewStats"></div>
    </div>
    <div class="card">
      <div class="row">
        <button class="pri" onclick="reviewWrong()">❌ 間違いだけ復習</button>
        <button onclick="reviewWeak()">弱点分野を出す</button>
      </div>
      <div class="row">
        <button onclick="resetStats()">記録をリセット</button>
      </div>
    </div>
  </section>

  <!-- DATA -->
  <section id="data" style="display:none">
    <div class="card">
      <p class="lead">結果を書き出して、AI家庭教師プロンプトに貼れば「弱いところ」を教われます。</p>
      <button class="startbtn" onclick="copyPrompt()" style="margin-bottom:14px">🎓 AI家庭教師プロンプトをコピー</button>
      <p class="hint" style="margin:-8px 0 14px">↑ これをコピーして、ChatGPT/Claudeの新しいチャットに貼れば、対話で弱点を教われます。</p>
      <div class="row">
        <button class="pri" onclick="exportAI()">📋 AI用テキスト(結果)をコピー</button>
        <button onclick="exportJSON()">💾 結果(JSON)を保存</button>
      </div>
      <textarea id="ioBox" placeholder="ここに JSON を貼って「読み込む」を押すと、結果や追加問題を取り込めます。"></textarea>
      <div class="row">
        <button onclick="importData()">読み込む</button>
        <button onclick="copyFormat()">AIに問題を作らせる書式</button>
      </div>
      <p class="hint">※ このアプリの記録はこの端末・このブラウザに保存されます。機種変前は「結果(JSON)を保存」でバックアップを。</p>
    </div>
  </section>
</div>
<div class="toast" id="toast"></div>

<script type="text/plain" id="tutorPrompt">あなたはAWS認定ソリューションアーキテクト アソシエイト（SAA-C03）の専属チューターです。私（受験者）と対話しながら学習を進めてください。

# 前提（私の状況）
- 試験日: 2026年6月24日。今日は今日の日付で計算して。残り日数が少ない。
- 直近の模試成績: ①26% → ②35% → ③34% と横ばい。合格ライン72%に届いていない。
- 原因は「間違いの見直し・言語化が未消化のまま次へ進んだこと」。だから今は新しい知識より、弱点パターンの定着を最優先する。
- 私は夜勤シフト勤務で、スキマ時間に勉強する。長文より、要点・図・語呂でテンポよく進めたい。

# 弱点（この順で優先的に出題して）
1. コンピューティング（模試③で最多11問・最大の弱点）
   - 移行: 物理/仮想サーバの丸ごと移行=AWS Application Migration Service (MGN)、アプリのデプロイ簡略化=Elastic Beanstalk、DB移行=DMS
   - コンテナ: 管理不要のコンテナ=ECS/EKS + Fargate
   - スケーリング: 時間が読める=スケジュールドスケーリング、負荷追従=ターゲット追跡
   - 起動時セットアップ: 毎回同じ設定=ユーザーデータ or カスタムAMI
   - S3へVPC内から低コストアクセス=ゲートウェイ型VPCエンドポイント
2. ネットワーク（VPC）（3回連続で最多級・最も根深い）
   - SG=ステートフル（戻り自動許可）／ NACL=ステートレス（戻りもエフェメラルポートを明示許可）
   - プライベートサブネットの外向き通信=NATゲートウェイ（各AZに1つ置いて冗長化）
   - SG同士の許可はSG IDを参照（IP不要）
   - 踏み台(Bastion)=パブリック、本体=プライベート
   - オンプレと即時・暗号化接続=Site-to-Site VPN、専用線=Direct Connect
   - Route53: CloudFront/ELBをAレコード化=ALIAS、フェイルオーバールーティング
   - CloudFrontのキャッシュヒット率を上げる考え方
   - ASGのヘルスチェックは EC2 vs ELB の使い分け（アプリ層の異常を見たいならELB）
3. IAM / 認証（模試③で再悪化）
   - 認証情報（アクセスキー）を直接埋め込む選択肢は必ず誤り。IAMロールを使う＝正解
   - サービス→サービスの権限=IAMロール付与
   - 他サービスから呼ばせる=リソースベースポリシーのPrincipal
   - 認証基盤の選び分け: クラウドのSSO=IAM Identity Center、フルのAD機能=AWS Managed Microsoft AD、オンプレADへ橋渡しだけ=AD Connector、アプリのユーザー管理=Cognito
   - ポリシー読解: 明示的Deny が最優先
4. データベース周辺（模試③で全滅0/3）
   - DynamoDBの読込を高速化（マイクロ秒）=DAX
   - DynamoDBの変更を検知してトリガー=DynamoDB Streams
   - マルチリージョンのDynamoDB=グローバルテーブル
   - インメモリで高速＋永続＋パーティション=ElastiCache for Redis
   - グローバル低遅延/DRのRDBMS=Aurora Global Database、読込スケール=Auroraレプリカ
5. S3 機能カタログ（改善途中）
   - 一時的な配布=署名付きURL、IP制限=バケットポリシー
   - 大量リクエスト性能=プレフィックス分散、最安アーカイブ=Glacier Deep Archive
   - クロスリージョンレプリケーション(CRR)=バージョニング必須
   - ライフサイクルでの自動移行、S3 Select、DLM（EBSスナップ自動化）

# 進め方（毎ターンこの流れを守る）
1. 1問ずつ出す。SAA本番に近い「シナリオ＋4択（A〜D）」形式。長すぎない問題文にする。
2. 出題したら必ず私の回答を待つ。複数問を一気に出さない。
3. 私の回答には「自信度（◎=確信 / ○=たぶん / △=勘 / ×=わからない）」も添えるので、それを参考にする。
4. 採点して、なぜ正解か＋なぜ他がダメかを簡潔に。専門用語の選び分けの「型」を一言で示す。
5. 私が間違えた・自信度が△か×・説明が曖昧なときは、定着のために次を出す:
   - 図解: 構成図やフローを、テキスト/表で分かりやすく描く。
   - 覚え方: 語呂・対比・「こう聞かれたらこう答える」の変換表など、記憶に残る形を提案する。
   - その後、同じ論点の確認問題をもう1問出して、定着したか確かめる。
6. できていたら次の論点へ。弱点の優先順（1→5）を基本に回すが、私が「○○を出して」と言ったらその分野を出す。
7. ときどき（5〜8問ごと）、ここまでの正答率と「特に危ない論点」を一言でフィードバックする。

# トーンと制約
- やさしめの口調で励ます。ただし試験まで時間がないので、結論ははっきり言う。遠回しにせず「ここは間違い」「これが最優先」と明確に。間違いは遠慮なく指摘し、なぜ落としたかを短く突く。
- ダメ出しの後は必ず「次はこう覚えればいい」と前向きな一手をセットで渡す。
- テンポよく。冗長な前置きは不要。
- 私が「ヒント」と言ったら、答えを言わずに考える方向だけ示す。
- 私が「弱いところ集中」と言ったら、直近で間違えた論点だけを連続で出す。
- 私が「本番モード」と言ったら、解説を後回しにして5問まとめて出し、最後に採点する。
- AWSの仕様は2024〜2025年時点の一般的なSAA-C03出題範囲に合わせる。不確かなときは正直に言う。

# クイズアプリ連携
- 私は別にスマホ用の「SAAスキマクイズ」アプリを使っている。私がクイズの結果テキストを貼ったら、弱い分野を最優先で解説し、その論点の問題を出すこと。

それでは、弱点1位の「コンピューティング（移行）」から第1問を出してください。まず1問だけ。私の回答を待ってから次に進めてください。</script>

<script>

const TOPICS = {compute:"コンピュート", network:"ネットワーク", iam:"IAM/認証", db:"データベース", s3:"S3"};
const BANK = [

 choices:["AWS DataSync","AWS Application Migration Service (MGN)","AWS Elastic Beanstalk","VM Import/Export で1台ずつ手動"],a:1,

/* ============ 状態 ============ */
const LS_STATS="saaQuizStats_v1", LS_MODE="saaQuizMode_v1", LS_EXTRA="saaQuizExtra_v1";
let stats = load(LS_STATS, {});           // id -> {seen,correct,wrongLast}
let extra = load(LS_EXTRA, []);           // 追加問題
let sel = {field:"weak", count:10};
let session = null;

function allBank(){ return BANK.concat(extra); }
function load(k,d){ try{return JSON.parse(localStorage.getItem(k))??d}catch(e){return d} }
function save(k,v){ localStorage.setItem(k,JSON.stringify(v)); }
function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),1500); }

/* ============ モード/ナビ ============ */
function setMode(m){
  document.body.classList.toggle('bed', m==='bed');
  document.getElementById('mBed').classList.toggle('on', m==='bed');
  document.getElementById('mCommute').classList.toggle('on', m!=='bed');
  save(LS_MODE,m);
}
function show(id){
  ['home','quiz','review','data'].forEach(s=>document.getElementById(s).style.display='none');
  document.getElementById(id).style.display='block';
  document.getElementById('navHome').classList.toggle('on',id==='home');
  document.getElementById('navReview').classList.toggle('on',id==='review');
  document.getElementById('navData').classList.toggle('on',id==='data');
  if(id==='review') renderReview();
  if(id==='home') renderHome();
}

/* ============ ホーム ============ */
function renderHome(){
  const pf=document.getElementById('pickField');
  const counts=fieldCounts();
  const items=[["weak","⭐ 弱点優先","おすすめ"],["all","全分野",allBank().length+"問"],
    ...Object.entries(TOPICS).map(([k,v])=>[k,v,(counts[k]||0)+"問"])];
  pf.innerHTML=items.map(([k,label,n])=>
    `<button data-f="${k}" onclick="setField('${k}')">${label}<span class="n">${n}</span></button>`).join('');
  setField(sel.field); setCount(sel.count);
  updatePool();
}
function fieldCounts(){ const c={}; allBank().forEach(q=>c[q.topic]=(c[q.topic]||0)+1); return c; }
function setField(f){ sel.field=f; document.querySelectorAll('#pickField button').forEach(b=>b.style.borderColor = b.dataset.f===f?'var(--accent)':'var(--line)'); updatePool(); }
function setCount(n){ sel.count=n; document.querySelectorAll('.count button').forEach(b=>b.classList.toggle('on', +b.dataset.n===n)); updatePool(); }
function buildPool(){
  let pool=allBank();
  if(sel.field==='weak'){
    pool=[...pool].sort((a,b)=>scoreWeak(a)-scoreWeak(b)); // 弱い/未挑戦を前に
  }else if(sel.field!=='all'){
    pool=pool.filter(q=>q.topic===sel.field);
  }else{
    pool=shuffle([...pool]);
  }
  if(sel.field==='weak') {/* keep weak-first order but shuffle ties lightly */}
  const n=sel.count||pool.length;
  return pool.slice(0,n);
}
function scoreWeak(q){ const s=stats[q.id]; if(!s||!s.seen) return -100; return s.correct/s.seen; }
function updatePool(){ const p=buildPool(); document.getElementById('poolInfo').textContent=`今回の出題: ${p.length}問`; document.getElementById('startBtn').disabled=p.length===0; }

/* ============ クイズ ============ */
function startQuiz(custom){
  const qs = custom || buildPool();
  if(!qs.length){ toast('問題がありません'); return; }
  session={list:qs, i:0, correct:0, wrongIds:[]};
  show('quiz'); renderQ();
}
function renderQ(){
  const q=session.list[session.i];
  document.getElementById('qPos').textContent=`${session.i+1} / ${session.list.length}`;
  document.getElementById('qScore').textContent=`正解 ${session.correct}`;
  document.getElementById('qBar').style.width=`${session.i/session.list.length*100}%`;
  document.getElementById('qTag').textContent=TOPICS[q.topic];
  document.getElementById('qText').textContent=q.q;
  const ch=document.getElementById('qChoices');
  ch.innerHTML=q.choices.map((c,idx)=>`<button onclick="answer(${idx})"><span class="lab">${'ABCD'[idx]}</span>${c}</button>`).join('');
  document.getElementById('qExplain').innerHTML='';
  document.getElementById('qNext').style.display='none';
  document.getElementById('qNext').textContent = session.i===session.list.length-1 ? '結果を見る ▶' : '次へ ▶';
}
function answer(idx){
  const q=session.list[session.i];
  const ok = idx===q.a;
  // record
  const s=stats[q.id]||{seen:0,correct:0,wrongLast:false};
  s.seen++; if(ok)s.correct++; s.wrongLast=!ok; stats[q.id]=s; save(LS_STATS,stats);
  if(ok)session.correct++; else session.wrongIds.push(q.id);
  // UI
  const btns=document.querySelectorAll('#qChoices button');
  btns.forEach((b,bi)=>{ b.disabled=true;
    if(bi===q.a)b.classList.add('correct');
    else if(bi===idx)b.classList.add('wrong');
    else b.classList.add('dim');
  });
  document.getElementById('qExplain').innerHTML=
    `<div class="explain"><div class="res ${ok?'ok':'ng'}">${ok?'⭕ 正解':'❌ 不正解（正解は '+'ABCD'[q.a]+'）'}</div>${q.explain}
     <div class="mn">💡 覚え方: ${q.mn}</div></div>`;
  document.getElementById('qNext').style.display='block';
  document.getElementById('qBar').style.width=`${(session.i+1)/session.list.length*100}%`;
}
function nextQ(){
  if(session.i>=session.list.length-1){ finishQuiz(); return; }
  session.i++; renderQ();
  window.scrollTo({top:0,behavior:'smooth'});
}
function finishQuiz(){ const c=session.correct, t=session.list.length; show('review'); toast(`${t}問中 ${c}問正解！`); }
function abortQuiz(){ session=null; show('home'); }

/* ============ 復習・結果 ============ */
function renderReview(){
  const bank=allBank();
  let seen=0,correct=0;
  bank.forEach(q=>{const s=stats[q.id]; if(s&&s.seen){seen+=s.seen;correct+=s.correct;}});
  const pct = seen? Math.round(correct/seen*100):0;
  const sum=document.getElementById('reviewSummary');
  if(!seen){ sum.innerHTML='<div class="empty">まだ記録がありません。<br>「出題」から始めましょう。</div>'; }
  else{
    let msg = pct>=72? '合格ライン超え！この調子で弱点を埋めよう。' : pct>=50? 'あと一歩。間違えた分野を集中的に潰そう。' : '伸びしろ大。下の弱点分野から1つずつ確実に。';
    sum.innerHTML=`<div class="big">${pct}%</div><div class="sub">のべ ${seen}問 / 正解 ${correct}　（合格ライン72%）</div><p class="lead" style="text-align:center;margin:8px 0 0">${msg}</p>`;
  }
  // per topic
  const box=document.getElementById('reviewStats'); let html='';
  Object.entries(TOPICS).forEach(([k,name])=>{
    let s=0,c=0; bank.filter(q=>q.topic===k).forEach(q=>{const r=stats[q.id]; if(r&&r.seen){s+=r.seen;c+=r.correct;}});
    const p= s? Math.round(c/s*100):null;
    const cls= p===null?'':p<50?'low':p<72?'mid':'hi';
    const barcol= p===null?'var(--line)':p<50?'var(--ng)':p<72?'#d97706':'var(--ok)';
    html+=`<div class="stat"><span class="name">${name}</span>
      <span style="display:flex;align-items:center;gap:10px">
        <span class="mini"><i style="width:${p||0}%;background:${barcol}"></i></span>
        <span class="pct ${cls}">${p===null?'—':p+'%'}</span></span></div>`;
  });
  box.innerHTML=html;
}
function reviewWrong(){
  const ids=allBank().filter(q=>stats[q.id]&&stats[q.id].wrongLast).map(q=>q.id);
  if(!ids.length){ toast('間違いの記録がありません'); return; }
  startQuiz(allBank().filter(q=>ids.includes(q.id)));
}
function reviewWeak(){
  const bank=allBank();
  // 正答率の低い分野トップを抽出
  let worst=null,worstP=2;
  Object.keys(TOPICS).forEach(k=>{let s=0,c=0;bank.filter(q=>q.topic===k).forEach(q=>{const r=stats[q.id];if(r&&r.seen){s+=r.seen;c+=r.correct;}});if(s){const p=c/s;if(p<worstP){worstP=p;worst=k;}}});
  if(!worst){ toast('まず何問か解いてください'); return; }
  show('home'); setField(worst); toast(TOPICS[worst]+'を出します');
  startQuiz(bank.filter(q=>q.topic===worst));
}
function resetStats(){ if(confirm('正答率などの記録をすべて消します。よろしいですか？')){ stats={}; save(LS_STATS,stats); renderReview(); toast('記録をリセットしました'); } }

/* ============ 書き出し / 読み込み ============ */
function buildResultObj(){
  const bank=allBank(); const byTopic={};
  Object.keys(TOPICS).forEach(k=>{let s=0,c=0;bank.filter(q=>q.topic===k).forEach(q=>{const r=stats[q.id];if(r&&r.seen){s+=r.seen;c+=r.correct;}});byTopic[k]={seen:s,correct:c};});
  return {type:"saa-quiz-result", date:new Date().toISOString().slice(0,10), stats, byTopic};
}
function exportJSON(){
  const blob=new Blob([JSON.stringify(buildResultObj(),null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download=`saa-quiz-${new Date().toISOString().slice(0,10)}.json`; a.click();
  toast('JSONを保存しました');
}
function exportAI(){
  const bank=allBank(); const r=buildResultObj();
  let txt=`SAA-C03 クイズ結果 (${r.date})\n`;
  let ts=0,tc=0; Object.values(r.byTopic).forEach(v=>{ts+=v.seen;tc+=v.correct;});
  txt+=`総合: ${tc}/${ts} (${ts?Math.round(tc/ts*100):0}%) ／ 合格ライン72%\n\n分野別:\n`;
  Object.entries(TOPICS).forEach(([k,name])=>{const v=r.byTopic[k];const p=v.seen?Math.round(v.correct/v.seen*100):null;
    txt+=`- ${name}: ${p===null?'未挑戦':v.correct+'/'+v.seen+' ('+p+'%)'}${p!==null&&p<72?'  ← 弱い':''}\n`;});
  const wrong=bank.filter(q=>stats[q.id]&&stats[q.id].wrongLast);
  if(wrong.length){ txt+=`\n直近で間違えた問題:\n`; wrong.forEach((q,i)=>{txt+=`${i+1}. [${TOPICS[q.topic]}] ${q.q}\n   → 正解: ${'ABCD'[q.a]} ${q.choices[q.a]}\n`;});}
  txt+=`\nこの結果をもとに、弱い分野を優先して解説し、同じ論点の問題を出してください。`;
  navigator.clipboard.writeText(txt).then(()=>toast('AI用テキストをコピーしました')).catch(()=>{document.getElementById('ioBox').value=txt;toast('下のボックスに出力しました');});
}
function importData(){
  let obj; try{obj=JSON.parse(document.getElementById('ioBox').value);}catch(e){ toast('JSONの形式が不正です'); return; }
  // 追加問題の取り込み
  let arr = Array.isArray(obj)?obj : (obj.questions||null);
  if(arr){
    let n=0; arr.forEach(q=>{ if(q.id&&q.q&&q.choices&&q.choices.length>=2&&typeof q.a==='number'&&TOPICS[q.topic]){
      if(!allBank().some(x=>x.id===q.id)){ extra.push({id:q.id,topic:q.topic,q:q.q,choices:q.choices,a:q.a,explain:q.explain||'',mn:q.mn||q.mnemonic||''}); n++; } }});
    save(LS_EXTRA,extra); toast(n+'問を追加しました'); renderHome(); return;
  }
  // 結果の復元
  if(obj.stats){ stats=obj.stats; save(LS_STATS,stats); toast('結果を読み込みました'); renderReview(); return; }
  toast('対応する内容が見つかりません');
}
function copyPrompt(){
  const p=document.getElementById('tutorPrompt').textContent.trim();
  navigator.clipboard.writeText(p).then(()=>toast('家庭教師プロンプトをコピーしました')).catch(()=>{document.getElementById('ioBox').value=p;toast('下のボックスに出力しました');});
}
function copyFormat(){
  const fmt=`次のJSON配列の形式で、AWS SAA-C03の4択問題を作ってください（topicは compute / network / iam / db / s3 のいずれか、aは正解の選択肢番号0始まり）。私の弱点（コンピュート→ネットワーク→IAM→DB→S3）を優先してください。\n\n[\n  {"id":"x1","topic":"network","q":"問題文","choices":["A選択肢","B選択肢","C選択肢","D選択肢"],"a":1,"explain":"なぜ正解か・他がダメか","mn":"覚え方・語呂"}\n]\n\n出力はJSONだけにしてください（このアプリの「読み込む」に貼って取り込みます）。`;
  navigator.clipboard.writeText(fmt).then(()=>toast('書式をコピーしました')).catch(()=>{document.getElementById('ioBox').value=fmt;toast('下に出力しました');});
}

/* ============ ユーティリティ ============ */
function shuffle(a){ for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

/* ============ 起動 ============ */
setMode(load(LS_MODE,'commute'));
renderHome();
</script>
